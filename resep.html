<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resep Menu - Zaytun Riverside</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_layout.css">
<style>
body{font-family:'Inter',sans-serif}
.wrap{display:grid;grid-template-columns:260px 1fr;gap:20px}
@media(max-width:768px){.wrap{grid-template-columns:1fr}}
.left-panel{background:#fff;border-radius:16px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);position:sticky;top:80px;max-height:calc(100vh - 100px);display:flex;flex-direction:column}
.lp-head{font-size:13px;font-weight:700;color:#1B4332;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #EDE8D8;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.msearch{width:100%;padding:8px 12px;border:1.5px solid #EDE8D8;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;outline:none;margin-bottom:8px;flex-shrink:0;box-sizing:border-box}
.msearch:focus{border-color:#40916C}
.mscroll{flex:1;overflow-y:auto}
.mkat-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#6b7280;padding:6px 4px 2px}
.mitem{padding:7px 10px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px}
.mitem:hover{background:#F8F3E8}
.mitem.active{background:#D8F3DC;color:#2D6A4F;font-weight:600}
.mitem-name{flex:1}
.mitem-badge{font-size:10px;background:#D8F3DC;color:#2D6A4F;padding:1px 7px;border-radius:10px;font-weight:700}
.mitem-del{display:none;background:none;border:none;color:#C0392B;cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;line-height:1}
.mitem:hover .mitem-del{display:block}
.mitem-del:hover{background:#FDECEA}
.btn-addmenu{font-size:11px;background:#D8F3DC;color:#2D6A4F;border:none;border-radius:8px;padding:4px 10px;cursor:pointer;font-weight:600}
.btn-addmenu:hover{background:#2D6A4F;color:#fff}
.fnew{background:#F8F3E8;border-radius:10px;padding:12px;margin-bottom:8px;display:none;flex-shrink:0}
.fnew.open{display:block}
.fnew input,.fnew select{width:100%;padding:8px 10px;border:1.5px solid #EDE8D8;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;outline:none;margin-bottom:8px;box-sizing:border-box}
.right-panel{background:#fff;border-radius:16px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.rp-title{font-size:17px;font-weight:700;color:#1B4332;margin-bottom:4px}
.rp-sub{font-size:12px;color:#6b7280;margin-bottom:20px}
.fbox{background:#F8F3E8;border-radius:12px;padding:16px;margin-bottom:16px}
.fbox-title{font-size:13px;font-weight:600;color:#1B4332;margin-bottom:12px}
.brow-head{display:grid;grid-template-columns:1fr 90px 80px 36px;gap:8px;margin-bottom:4px}
.brow-head span{font-size:10px;font-weight:700;text-transform:uppercase;color:#6b7280}
.brow-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.brow{display:grid;grid-template-columns:1fr 90px 80px 36px;gap:8px;align-items:center}
.brow select,.brow input{padding:8px 10px;border:1.5px solid #EDE8D8;border-radius:8px;font-size:13px;font-family:'Inter',sans-serif;outline:none;width:100%;background:#fff;box-sizing:border-box}
.brow select:focus,.brow input:focus{border-color:#40916C}
.btn-bdel{background:#FDECEA;border:none;border-radius:8px;color:#C0392B;cursor:pointer;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:14px}
.btn-bdel:hover{background:#C0392B;color:#fff}
.rtbl{width:100%;border-collapse:collapse}
.rtbl th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:#6b7280;padding:0 10px 8px;border-bottom:1px solid #EDE8D8}
.rtbl td{padding:10px;border-bottom:1px solid #F8F3E8;font-size:13px;vertical-align:middle}
.rtbl tr:last-child td{border-bottom:none}
.rtbl tr:hover td{background:#F8F3E8}
.btn-edit2{background:#FDF3DC;border:none;border-radius:6px;color:#8a6914;font-size:12px;font-weight:600;cursor:pointer;padding:4px 10px}
.btn-edit2:hover{background:#C9A84C;color:#fff}
.btn-rdel{background:#FDECEA;border:none;border-radius:6px;color:#C0392B;font-size:12px;cursor:pointer;padding:4px 8px}
.btn-rdel:hover{background:#C0392B;color:#fff}
.sec-lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#6b7280;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #EDE8D8;padding-top:14px;margin-top:14px;margin-bottom:10px}
.empty-state{text-align:center;padding:48px 16px;color:#6b7280}
.ei{font-size:40px;margin-bottom:12px}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar"></aside>
<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="menu-toggle" onclick="toggleSidebar()">&#9776;</button>
      <div class="topbar-left"><h1>Resep Menu</h1><div class="breadcrumb">Mapping bahan baku per menu</div></div>
    </div>
    <div class="topbar-right">
      <button class="btn-action" onclick="init()">&#8635; Refresh</button>
    </div>
  </div>
  <div class="page-content">
    <div class="wrap">
      <div class="left-panel">
        <div class="lp-head">
          <span>Menu (<span id="mcount">0</span>)</span>
          <button class="btn-addmenu" id="btnToggleNew">+ Tambah</button>
        </div>
        <div class="fnew" id="fnew">
          <input type="text" id="inpNama" placeholder="Nama menu baru...">
          <select id="inpKat">
            <option value="Ayam Kota">Ayam Kota</option>
            <option value="Ayam Kp">Ayam Kp</option>
            <option value="Ikan">Ikan</option>
            <option value="Olahan Nasi">Olahan Nasi</option>
            <option value="Sayuran">Sayuran</option>
            <option value="Seblak & Mie">Seblak &amp; Mie</option>
            <option value="Cemilan">Cemilan</option>
            <option value="Minum">Minum</option>
            <option value="Tambahan">Tambahan</option>
            <option value="Manual">Lainnya</option>
          </select>
          <div style="display:flex;gap:8px">
            <button class="btn-primary" style="flex:1" id="btnSaveMenu">Tambah Menu</button>
            <button class="btn-secondary" id="btnCancelMenu">Batal</button>
          </div>
        </div>
        <input class="msearch" id="msearch" placeholder="Cari menu...">
        <div class="mscroll" id="mscroll"><div class="loading-state"><div class="loading-spinner"></div></div></div>
      </div>
      <div class="right-panel" id="rightPanel">
        <div class="empty-state"><div class="ei">&#128214;</div><div style="font-size:14px;font-weight:600">Pilih menu di sebelah kiri</div><div style="font-size:13px;margin-top:4px">untuk input atau edit resep</div></div>
      </div>
    </div>
  </div>
</main>
<script src="_app.js"></script>
<script>
// ── State ─────────────────────────
var API    = getApiUrl();
var menus  = [];
var bahans = [];
var cache  = {};
var active = null;
var rows   = [];
var SKAT   = ['Bahan Baku','Bahan Penunjang','Buah-buahan','Bumbu Masak','Frozen Food','Minum Kemasan'];

initPage('resep');

// ── Event listeners statis ────────
document.getElementById('btnToggleNew').addEventListener('click', function(){ document.getElementById('fnew').classList.toggle('open'); });
document.getElementById('btnCancelMenu').addEventListener('click', function(){ document.getElementById('fnew').classList.remove('open'); });
document.getElementById('btnSaveMenu').addEventListener('click', doAddMenu);
document.getElementById('msearch').addEventListener('input', renderMenuList);

// ── Init ──────────────────────────
init();
async function init() {
  try {
    var r1 = await apiGet({action:'getMenuList'});
    var r2 = await apiGet({action:'getMasterBelanja'});
    if (r1.status === 'ok') menus  = r1.data || [];
    if (r2.status === 'ok') bahans = (r2.data || []).filter(function(m){ return SKAT.indexOf(m.kategori) >= 0; });
    document.getElementById('mcount').textContent = menus.length;
    renderMenuList();
  } catch(e) {
    document.getElementById('mscroll').innerHTML = '<div style="padding:12px;color:#C0392B;font-size:13px">Gagal memuat: ' + e.message + '</div>';
  }
}

// ── Render daftar menu (DOM, no innerHTML event) ──
function renderMenuList() {
  var q      = document.getElementById('msearch').value.toLowerCase();
  var list   = q ? menus.filter(function(m){ return m.nama_menu && m.nama_menu.toLowerCase().indexOf(q) >= 0; }) : menus;
  var scroll = document.getElementById('mscroll');
  scroll.innerHTML = '';

  if (!list.length) {
    scroll.innerHTML = '<div style="padding:12px;color:#6b7280;font-size:13px">Tidak ada menu</div>';
    return;
  }

  // Grouping
  var grouped = {};
  var order   = [];
  list.forEach(function(m) {
    var k = m.kategori || 'Lainnya';
    if (!grouped[k]) { grouped[k] = []; order.push(k); }
    grouped[k].push(m);
  });

  order.forEach(function(kat) {
    // Label kategori
    var lbl = document.createElement('div');
    lbl.className = 'mkat-label';
    lbl.textContent = kat;
    scroll.appendChild(lbl);

    grouped[kat].forEach(function(m) {
      var item = document.createElement('div');
      item.className = 'mitem' + (active === m.nama_menu ? ' active' : '');

      var nameSpan = document.createElement('span');
      nameSpan.className = 'mitem-name';
      nameSpan.textContent = m.nama_menu;

      var r   = cache[m.nama_menu];
      var jml = r ? r.length : 0;

      var delBtn = document.createElement('button');
      delBtn.className = 'mitem-del';
      delBtn.textContent = '\uD83D\uDDD1';
      delBtn.title = 'Hapus menu';

      // Simpan data di closure — TIDAK di HTML attribute
      ;(function(menu) {
        item.addEventListener('click', function() { pickMenu(menu.nama_menu); });
        delBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          doDelMenu(menu.id_menu, menu.nama_menu);
        });
      })(m);

      item.appendChild(nameSpan);
      if (jml > 0) {
        var badge = document.createElement('span');
        badge.className = 'mitem-badge';
        badge.textContent = jml;
        item.appendChild(badge);
      }
      item.appendChild(delBtn);
      scroll.appendChild(item);
    });
  });
}

// ── Tambah menu baru ──────────────
async function doAddMenu() {
  var nama = document.getElementById('inpNama').value.trim();
  var kat  = document.getElementById('inpKat').value;
  if (!nama) { alert('Nama menu wajib diisi'); return; }
  if (menus.find(function(m){ return m.nama_menu === nama; })) { alert('Menu sudah ada'); return; }
  try {
    var d = await apiPost({action:'tambahMenu', nama_menu:nama, kategori:kat});
    if (d.status === 'ok') {
      menus.push({id_menu: d.id_menu || ('X'+Date.now()), nama_menu:nama, kategori:kat, harga:0});
      document.getElementById('mcount').textContent = menus.length;
      document.getElementById('inpNama').value = '';
      document.getElementById('fnew').classList.remove('open');
      renderMenuList();
      pickMenu(nama);
    } else { alert('Gagal: ' + d.message); }
  } catch(e) { alert('Error: ' + e.message); }
}

// ── Hapus menu ────────────────────
async function doDelMenu(id, nama) {
  if (!confirm('Hapus menu "' + nama + '"?')) return;
  try {
    var d = await apiPost({action:'hapusMenu', id_menu:id, nama_menu:nama});
    if (d.status === 'ok') {
      menus = menus.filter(function(m){ return m.nama_menu !== nama; });
      delete cache[nama];
      document.getElementById('mcount').textContent = menus.length;
      if (active === nama) {
        active = null;
        document.getElementById('rightPanel').innerHTML = '<div class="empty-state"><div class="ei">&#128214;</div><div style="font-size:14px;font-weight:600">Pilih menu di sebelah kiri</div></div>';
      }
      renderMenuList();
    } else { alert('Gagal hapus: ' + d.message); }
  } catch(e) { alert('Error hapus: ' + e.message); }
}

// ── Pilih menu ────────────────────
async function pickMenu(nama) {
  active = nama;
  rows   = [];
  renderMenuList();
  document.getElementById('rightPanel').innerHTML = '<div class="loading-state"><div class="loading-spinner"></div></div>';
  try {
    var d = await apiGet({action:'getResep', nama_menu:nama});
    cache[nama] = (d.status === 'ok') ? d.data : [];
    renderRightPanel();
    renderMenuList();
  } catch(e) {
    document.getElementById('rightPanel').innerHTML = '<div class="empty-state"><div class="ei">&#9888;</div><div>Gagal: ' + e.message + '</div></div>';
  }
}

// ── Render panel kanan (DOM) ──────
function renderRightPanel() {
  var nama  = active;
  var resep = cache[nama] || [];
  var panel = document.getElementById('rightPanel');
  panel.innerHTML = '';

  // Title
  var title = document.createElement('div');
  title.className = 'rp-title';
  title.textContent = '\uD83D\uDCD6 ' + nama;
  panel.appendChild(title);

  var sub = document.createElement('div');
  sub.className = 'rp-sub';
  sub.textContent = 'Bahan baku per 1 porsi \u2014 untuk hitung stok keluar otomatis';
  panel.appendChild(sub);

  // Form box
  var fbox = document.createElement('div');
  fbox.className = 'fbox';
  fbox.id = 'fbox';
  fbox.style.display = resep.length === 0 ? 'block' : 'none';

  var ftitle = document.createElement('div');
  ftitle.className = 'fbox-title';
  ftitle.id = 'fboxTitle';
  ftitle.textContent = resep.length === 0 ? '\u2795 Tambah Bahan Baku' : '\u270E Edit Resep';
  fbox.appendChild(ftitle);

  // Header kolom
  var bhead = document.createElement('div');
  bhead.className = 'brow-head';
  ['Bahan Baku','Qty/Porsi','Satuan',''].forEach(function(t) {
    var s = document.createElement('span'); s.textContent = t; bhead.appendChild(s);
  });
  fbox.appendChild(bhead);

  // Baris bahan
  var browList = document.createElement('div');
  browList.className = 'brow-list';
  browList.id = 'browList';
  fbox.appendChild(browList);

  // Tombol tambah baris + batal
  var fbtns = document.createElement('div');
  fbtns.style.cssText = 'display:flex;gap:8px;margin-top:8px';
  var btnAdd = document.createElement('button');
  btnAdd.className = 'btn-secondary';
  btnAdd.textContent = '+ Tambah Bahan';
  btnAdd.addEventListener('click', function() { rows.push({id_bahan:'',nama_bahan:'',jumlah:'',satuan:''}); renderBahanRows(); });
  var btnBatal = document.createElement('button');
  btnBatal.className = 'btn-secondary';
  btnBatal.id = 'btnBatal';
  btnBatal.textContent = '\u2715 Batal';
  btnBatal.style.display = resep.length === 0 ? 'none' : '';
  btnBatal.addEventListener('click', function() {
    rows = [];
    document.getElementById('fbox').style.display = 'none';
    document.getElementById('fAksi').style.display = 'none';
  });
  fbtns.appendChild(btnAdd);
  fbtns.appendChild(btnBatal);
  fbox.appendChild(fbtns);
  panel.appendChild(fbox);

  // Tombol simpan
  var fAksi = document.createElement('div');
  fAksi.id = 'fAksi';
  fAksi.style.cssText = 'display:' + (resep.length === 0 ? 'flex' : 'none') + ';gap:10px;margin:10px 0 12px';
  var btnSave = document.createElement('button');
  btnSave.className = 'btn-primary';
  btnSave.textContent = '\uD83D\uDCBE Simpan Resep';
  btnSave.addEventListener('click', doSaveResep);
  fAksi.appendChild(btnSave);
  panel.appendChild(fAksi);

  // Status
  var fStatus = document.createElement('div');
  fStatus.id = 'fStatus';
  fStatus.style.cssText = 'font-size:13px;margin:8px 0';
  panel.appendChild(fStatus);

  // Section label
  var secLbl = document.createElement('div');
  secLbl.className = 'sec-lbl';
  var secSpan = document.createElement('span');
  secSpan.textContent = 'Resep Tersimpan (' + resep.length + ' bahan)';
  secLbl.appendChild(secSpan);
  if (resep.length > 0) {
    var btnEdit = document.createElement('button');
    btnEdit.className = 'btn-edit2';
    btnEdit.textContent = '\u270E Edit';
    btnEdit.addEventListener('click', function() {
      rows = resep.map(function(r){ return {id_bahan:r.id_bahan, nama_bahan:r.nama_bahan, jumlah:r.jumlah_per_porsi||r.jumlah||'', satuan:r.satuan}; });
      if (!rows.length) rows = [{id_bahan:'',nama_bahan:'',jumlah:'',satuan:''}];
      document.getElementById('fbox').style.display = 'block';
      document.getElementById('fAksi').style.display = 'flex';
      document.getElementById('fboxTitle').textContent = '\u270E Edit Resep';
      document.getElementById('btnBatal').style.display = '';
      renderBahanRows();
    });
    secLbl.appendChild(btnEdit);
  }
  panel.appendChild(secLbl);

  // Tabel resep tersimpan
  if (resep.length === 0) {
    var noResep = document.createElement('div');
    noResep.style.cssText = 'color:#6b7280;font-size:13px;padding:4px 0';
    noResep.textContent = 'Belum ada resep \u2014 isi form di atas.';
    panel.appendChild(noResep);
  } else {
    var tbl = document.createElement('table');
    tbl.className = 'rtbl';
    tbl.innerHTML = '<thead><tr><th>Bahan Baku</th><th>Qty/Porsi</th><th>Satuan</th><th></th></tr></thead>';
    var tbody = document.createElement('tbody');
    resep.forEach(function(r) {
      var tr = document.createElement('tr');
      var td1 = document.createElement('td'); td1.style.fontWeight='500'; td1.textContent = r.nama_bahan;
      var td2 = document.createElement('td'); td2.textContent = r.jumlah_per_porsi;
      var td3 = document.createElement('td'); td3.style.color='#6b7280'; td3.textContent = r.satuan;
      var td4 = document.createElement('td');
      var delBtn = document.createElement('button');
      delBtn.className = 'btn-rdel';
      delBtn.textContent = '\uD83D\uDDD1';
      ;(function(resepId) {
        delBtn.addEventListener('click', function() { doDelBahan(resepId); });
      })(r.id_resep);
      td4.appendChild(delBtn);
      tr.appendChild(td1); tr.appendChild(td2); tr.appendChild(td3); tr.appendChild(td4);
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    panel.appendChild(tbl);
  }

  // Init baris jika form terbuka
  if (resep.length === 0) {
    rows = [{id_bahan:'',nama_bahan:'',jumlah:'',satuan:''}];
    renderBahanRows();
  }
}

// ── Render baris bahan (DOM) ──────
function renderBahanRows() {
  var cont = document.getElementById('browList');
  if (!cont) return;
  cont.innerHTML = '';

  if (!rows.length) {
    cont.innerHTML = '<div style="color:#6b7280;font-size:13px;padding:4px 0">Klik "+ Tambah Bahan"</div>';
    return;
  }

  rows.forEach(function(b, i) {
    var rowEl = document.createElement('div');
    rowEl.className = 'brow';

    // Select bahan
    var sel = document.createElement('select');
    var defOpt = document.createElement('option');
    defOpt.value = ''; defOpt.textContent = '\u2014 Pilih Bahan Baku \u2014';
    sel.appendChild(defOpt);
    bahans.forEach(function(m) {
      var opt = document.createElement('option');
      opt.value = m.id_item;
      opt.textContent = m.nama_item;
      opt.dataset.nama = m.nama_item;
      opt.dataset.sat  = m.satuan;
      if (m.id_item === b.id_bahan) opt.selected = true;
      sel.appendChild(opt);
    });
    ;(function(idx) {
      sel.addEventListener('change', function() {
        var opt = sel.options[sel.selectedIndex];
        rows[idx].id_bahan   = sel.value;
        rows[idx].nama_bahan = opt.dataset.nama || '';
        rows[idx].satuan     = opt.dataset.sat  || '';
        // Update input satuan
        var inputs = rowEl.querySelectorAll('input');
        if (inputs[1]) inputs[1].value = rows[idx].satuan;
      });
    })(i);

    // Input qty
    var inpQty = document.createElement('input');
    inpQty.type = 'number'; inpQty.min = '0'; inpQty.step = '0.001';
    inpQty.placeholder = '0'; inpQty.value = b.jumlah || '';
    ;(function(idx) {
      inpQty.addEventListener('input', function(){ rows[idx].jumlah = parseFloat(inpQty.value) || 0; });
    })(i);

    // Input satuan
    var inpSat = document.createElement('input');
    inpSat.type = 'text'; inpSat.placeholder = 'satuan';
    inpSat.value = b.satuan || '';
    ;(function(idx) {
      inpSat.addEventListener('input', function(){ rows[idx].satuan = inpSat.value; });
    })(i);

    // Tombol hapus baris
    var delRow = document.createElement('button');
    delRow.className = 'btn-bdel'; delRow.textContent = '\u2715';
    ;(function(idx) {
      delRow.addEventListener('click', function(){ rows.splice(idx,1); renderBahanRows(); });
    })(i);

    rowEl.appendChild(sel); rowEl.appendChild(inpQty);
    rowEl.appendChild(inpSat); rowEl.appendChild(delRow);
    cont.appendChild(rowEl);
  });
}

// ── Simpan resep ──────────────────
async function doSaveResep() {
  var seen = {};
  rows.filter(function(b){ return b.id_bahan && Number(b.jumlah) > 0; })
      .forEach(function(b){ seen[b.id_bahan] = b; });
  var valid = Object.values(seen);
  if (!valid.length) { alert('Tambahkan minimal 1 bahan dengan qty > 0'); return; }
  var st = document.getElementById('fStatus');
  if (st) st.textContent = 'Menyimpan...';
  try {
    var d = await apiPost({action:'simpanResep', nama_menu:active, bahan:valid});
    if (d.status === 'ok') {
      rows = [];
      cache[active] = null;
      await pickMenu(active);
    } else {
      if (st) st.textContent = 'Gagal: ' + d.message;
    }
  } catch(e) {
    if (st) st.textContent = 'Gagal konek: ' + e.message;
  }
}

// ── Hapus satu bahan resep ────────
async function doDelBahan(idResep) {
  if (!confirm('Hapus bahan ini?')) return;
  try {
    var d = await apiPost({action:'hapusResep', id_resep:idResep});
    if (d.status === 'ok') { cache[active] = null; await pickMenu(active); }
  } catch(e) { alert('Error: ' + e.message); }
}
</script>
</body>
</html>
