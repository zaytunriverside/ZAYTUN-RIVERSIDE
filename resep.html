<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resep Menu — Zaytun Riverside</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_layout.css">
<style>
  body { font-family:'Inter',sans-serif; }
  .resep-layout { display:grid; grid-template-columns:260px 1fr; gap:20px; }
  .menu-list { background:var(--putih); border-radius:16px; padding:16px; box-shadow:0 1px 4px rgba(0,0,0,0.06); border:1px solid rgba(0,0,0,0.04); height:fit-content; position:sticky; top:80px; }
  .menu-list-title { font-size:13px; font-weight:700; color:var(--hijau-tua); margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--krem-gelap); }
  .menu-search { width:100%; padding:8px 12px; border:1.5px solid var(--krem-gelap); border-radius:8px; font-size:13px; font-family:'Inter',sans-serif; outline:none; margin-bottom:10px; }
  .menu-search:focus { border-color:var(--hijau-mid); }
  .menu-item { padding:8px 10px; border-radius:8px; cursor:pointer; font-size:13px; color:var(--teks); transition:all 0.15s; display:flex; align-items:center; justify-content:space-between; gap:6px; }
  .menu-item:hover { background:var(--krem); }
  .menu-item.active { background:var(--hijau-pale); color:var(--hijau); font-weight:600; }
  .menu-item .badge-resep { font-size:10px; background:var(--hijau-pale); color:var(--hijau); padding:1px 6px; border-radius:10px; font-weight:600; white-space:nowrap; }
  .menu-scroll { max-height:520px; overflow-y:auto; }

  .resep-panel { background:var(--putih); border-radius:16px; padding:24px; box-shadow:0 1px 4px rgba(0,0,0,0.06); border:1px solid rgba(0,0,0,0.04); }
  .resep-panel-title { font-family:'Playfair Display',serif; font-size:17px; font-weight:700; color:var(--hijau-tua); margin-bottom:4px; }
  .resep-panel-sub { font-size:12px; color:var(--teks-abu); margin-bottom:20px; }

  /* Tabel resep tersimpan */
  .resep-table { width:100%; border-collapse:collapse; margin-top:12px; }
  .resep-table th { text-align:left; font-size:11px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; color:var(--teks-abu); padding:0 10px 8px; border-bottom:1px solid var(--krem-gelap); }
  .resep-table td { padding:10px; border-bottom:1px solid var(--krem); font-size:13px; vertical-align:middle; }
  .resep-table tr:last-child td { border-bottom:none; }
  .resep-table tr:hover td { background:var(--krem); }

  /* Form tambah bahan */
  .form-tambah { background:var(--krem); border-radius:12px; padding:16px; margin-bottom:16px; }
  .form-tambah-title { font-size:13px; font-weight:600; color:var(--hijau-tua); margin-bottom:12px; }
  .bahan-row-grid { display:grid; grid-template-columns:1fr 100px 80px 40px; gap:8px; align-items:center; margin-bottom:8px; }
  .bahan-row-grid select, .bahan-row-grid input { padding:8px 10px; border:1.5px solid var(--krem-gelap); border-radius:8px; font-size:13px; font-family:'Inter',sans-serif; outline:none; width:100%; background:var(--putih); }
  .bahan-row-grid select:focus, .bahan-row-grid input:focus { border-color:var(--hijau-mid); }
  .btn-del-row { background:var(--merah-pale); border:none; border-radius:8px; color:var(--merah); font-size:14px; cursor:pointer; width:34px; height:34px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
  .btn-del-row:hover { background:var(--merah); color:white; }

  .btn-edit-resep { background:var(--emas-pale); border:none; border-radius:6px; color:#8a6914; font-size:12px; font-weight:600; cursor:pointer; padding:4px 10px; transition:all 0.2s; font-family:'Inter',sans-serif; }
  .btn-edit-resep:hover { background:var(--emas); color:white; }
  .btn-del-resep { background:var(--merah-pale); border:none; border-radius:6px; color:var(--merah); font-size:12px; cursor:pointer; padding:4px 8px; transition:all 0.2s; }
  .btn-del-resep:hover { background:var(--merah); color:white; }

  .empty-panel { text-align:center; padding:48px 16px; color:var(--teks-abu); }
  .empty-panel .ei { font-size:40px; margin-bottom:12px; }

  @media (max-width:768px) { .resep-layout { grid-template-columns:1fr; } .menu-list { position:static; } }
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar"></aside>
<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="topbar-left"><h1>Resep Menu</h1><div class="breadcrumb">Mapping bahan baku per menu untuk hitung stok keluar otomatis</div></div>
    </div>
    <div class="topbar-right">
      <button class="btn-action" onclick="loadMenuList()">↻ Refresh</button>
    </div>
  </div>

  <div class="page-content">
    <div class="resep-layout">

      <!-- Daftar Menu -->
      <div class="menu-list">
        <div class="menu-list-title">📋 Menu dari KasPOS</div>
        <input class="menu-search" type="text" id="menuSearch" placeholder="Cari menu..." oninput="filterMenu()">
        <div class="menu-scroll" id="menuScroll">
          <div class="loading-state"><div class="loading-spinner"></div></div>
        </div>
      </div>

      <!-- Panel Resep -->
      <div class="resep-panel" id="resepPanel">
        <div class="empty-panel">
          <div class="ei">📖</div>
          <div style="font-size:14px;font-weight:600;color:var(--teks-abu);">Pilih menu di sebelah kiri</div>
          <div style="font-size:13px;margin-top:4px;">untuk mulai input atau edit resep</div>
        </div>
      </div>

    </div>
  </div>
</main>

<script src="_app.js"></script>
<script>
const API_URL   = getApiUrl();
let menuList    = [];
let masterBahan = [];
let resepCache  = {};
let activeMenu  = null;
let bahanRows   = [];
let editMode    = false;

initPage('resep');
loadMenuList();
loadMasterBahan();

async function loadMenuList() {
  try {
    const data = await apiGet({ action:'getMenuList' });
    if (data.status==='ok') { menuList = data.data; renderMenuList(); }
  } catch(e) {}
}

async function loadMasterBahan() {
  try {
    const data = await apiGet({ action:'getMasterBelanja' });
    if (data.status==='ok') masterBahan = data.data;
  } catch(e) {}
}

function renderMenuList() {
  const q    = document.getElementById('menuSearch').value.toLowerCase();
  const list = q ? menuList.filter(m => m.toLowerCase().includes(q)) : menuList;
  let html   = '';
  list.forEach(m => {
    const resep    = resepCache[m];
    const hasResep = resep && resep.length > 0;
    html += `<div class="menu-item${activeMenu===m?' active':''}" onclick="pilihMenu(${JSON.stringify(m)})">
      <span style="flex:1;">${m}</span>
      ${hasResep?`<span class="badge-resep">${resep.length} bahan</span>`:''}
    </div>`;
  });
  document.getElementById('menuScroll').innerHTML = html || '<div style="padding:12px;color:var(--teks-abu);font-size:13px;">Tidak ada menu</div>';
}

function filterMenu() { renderMenuList(); }

async function pilihMenu(nama) {
  activeMenu = nama;
  editMode   = false;
  bahanRows  = [];
  renderMenuList();
  document.getElementById('resepPanel').innerHTML = '<div class="loading-state"><div class="loading-spinner"></div></div>';
  try {
    const data = await apiGet({ action:'getResep', nama_menu: nama });
    if (data.status==='ok') {
      resepCache[nama] = data.data;
      renderPanel(nama);
      renderMenuList();
    }
  } catch(e) { document.getElementById('resepPanel').innerHTML = '<div class="empty-panel">⚠️ Gagal memuat resep</div>'; }
}

function renderPanel(nama) {
  const resep = resepCache[nama] || [];
  let html    = `
    <div class="resep-panel-title">📖 ${nama}</div>
    <div class="resep-panel-sub">Bahan baku utama per 1 porsi menu ini (untuk hitung stok keluar otomatis)</div>`;

  // Form input/edit
  if (editMode || !resep.length) {
    html += `
      <div class="form-tambah">
        <div class="form-tambah-title">${resep.length ? '✏️ Edit Resep' : '➕ Tambah Resep'}</div>
        <div id="bahanRows"></div>
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button class="btn-secondary" onclick="tambahBahanRow()">+ Tambah Bahan</button>
          ${editMode?`<button class="btn-secondary" onclick="batalEdit()">✕ Batal</button>`:''}
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-bottom:20px;">
        <button class="btn-primary" onclick="simpanResep()">💾 Simpan Resep</button>
      </div>
      <div id="resepStatus" style="margin-bottom:12px;font-size:13px;"></div>`;
  }

  // Tabel resep tersimpan
  html += `<div style="font-size:13px;font-weight:600;color:var(--hijau-tua);margin-bottom:8px;">
    Resep Tersimpan
    ${resep.length && !editMode ? `<button class="btn-edit-resep" style="margin-left:10px;" onclick="mulaiEdit()">✏️ Edit Resep</button>` : ''}
  </div>`;

  if (!resep.length) {
    html += `<div style="color:var(--teks-abu);font-size:13px;padding:12px 0;">Belum ada resep — tambahkan bahan di atas.</div>`;
  } else {
    html += `<table class="resep-table"><thead><tr>
      <th style="width:40%;">Bahan</th>
      <th style="width:20%;">Jumlah/Porsi</th>
      <th style="width:15%;">Satuan</th>
      <th style="width:25%;"></th>
    </tr></thead><tbody>`;
    resep.forEach((r, i) => {
      html += `<tr>
        <td style="font-weight:500;">${r.nama_bahan}</td>
        <td>${r.jumlah_per_porsi}</td>
        <td style="color:var(--teks-abu);">${r.satuan}</td>
        <td>
          <button class="btn-del-resep" onclick="hapusSatuBahan('${r.id_resep}',${JSON.stringify(nama)})">🗑 Hapus</button>
        </td>
      </tr>`;
    });
    html += `</tbody></table>`;
  }

  document.getElementById('resepPanel').innerHTML = html;
  if (editMode || !resep.length) {
    // Pre-fill baris jika edit
    if (editMode && resep.length) {
      bahanRows = resep.map(r => ({ id_bahan:r.id_bahan, nama_bahan:r.nama_bahan, jumlah:r.jumlah_per_porsi, satuan:r.satuan }));
    } else if (!bahanRows.length) {
      bahanRows = [{ id_bahan:'', nama_bahan:'', jumlah:0, satuan:'' }];
    }
    renderBahanRows();
  }
}

function mulaiEdit() { editMode = true; bahanRows = (resepCache[activeMenu]||[]).map(r => ({ id_bahan:r.id_bahan, nama_bahan:r.nama_bahan, jumlah:r.jumlah_per_porsi, satuan:r.satuan })); renderPanel(activeMenu); }
function batalEdit() { editMode = false; bahanRows = []; renderPanel(activeMenu); }

function renderBahanRows() {
  const container = document.getElementById('bahanRows');
  if (!container) return;
  let html = '';
  if (!bahanRows.length) {
    html = '<div style="color:var(--teks-abu);font-size:13px;padding:4px 0 8px;">Klik "+ Tambah Bahan" untuk mulai</div>';
  }
  bahanRows.forEach((b, i) => {
    const opts = masterBahan.map(m =>
      `<option value="${m.id_item}" data-nama="${m.nama_item}" data-satuan="${m.satuan}" ${m.id_item===b.id_bahan?'selected':''}>${m.nama_item}</option>`
    ).join('');
    html += `<div class="bahan-row-grid">
      <select onchange="patchBahan(${i},this)"><option value="">— Pilih Bahan —</option>${opts}</select>
      <input type="number" min="0" step="0.001" placeholder="Jumlah" value="${b.jumlah||''}" oninput="bahanRows[${i}].jumlah=parseFloat(this.value)||0">
      <input type="text" placeholder="Satuan" value="${b.satuan||''}" oninput="bahanRows[${i}].satuan=this.value">
      <button class="btn-del-row" onclick="hapusBahanRow(${i})">✕</button>
    </div>`;
  });
  container.innerHTML = html;
}

function patchBahan(i, sel) {
  const opt = sel.options[sel.selectedIndex];
  bahanRows[i].id_bahan   = sel.value;
  bahanRows[i].nama_bahan = opt.dataset.nama   || '';
  bahanRows[i].satuan     = opt.dataset.satuan || '';
  renderBahanRows();
}

function tambahBahanRow() { bahanRows.push({ id_bahan:'', nama_bahan:'', jumlah:0, satuan:'' }); renderBahanRows(); }
function hapusBahanRow(i) { bahanRows.splice(i,1); renderBahanRows(); }

async function simpanResep() {
  const valid = bahanRows.filter(b => b.id_bahan && Number(b.jumlah)>0);
  if (!valid.length) { alert('Tambahkan minimal 1 bahan dengan jumlah > 0'); return; }
  try {
    const data = await apiPost({ action:'simpanResep', nama_menu:activeMenu, bahan:valid });
    if (data.status==='ok') {
      editMode = false; bahanRows = [];
      resepCache[activeMenu] = null;
      await pilihMenu(activeMenu);
    } else { document.getElementById('resepStatus').innerHTML = `<span style="color:var(--merah);">❌ ${data.message}</span>`; }
  } catch(e) { document.getElementById('resepStatus').innerHTML = `<span style="color:var(--merah);">❌ Gagal konek</span>`; }
}

async function hapusSatuBahan(id, nama) {
  if (!confirm('Hapus bahan ini dari resep?')) return;
  try {
    await apiPost({ action:'hapusResep', id_resep:id });
    resepCache[nama] = null;
    await pilihMenu(nama);
  } catch(e) {}
}
</script>
</body>
</html>
