<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Belanja — Zaytun Riverside</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_layout.css">
<style>
  .belanja-toolbar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:16px; }
  .belanja-toolbar label { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--teks-abu); display:block; margin-bottom:4px; }
  .belanja-toolbar input { padding:9px 12px; border:1.5px solid var(--krem-gelap); border-radius:10px; font-size:13px; font-family:'DM Sans',sans-serif; background:var(--putih); outline:none; }
  .belanja-toolbar input:focus { border-color:var(--hijau-mid); }
  .search-input { padding:9px 12px 9px 36px; border:1.5px solid var(--krem-gelap); border-radius:10px; font-size:13px; font-family:'DM Sans',sans-serif; background:var(--putih); outline:none; width:220px; }
  .search-wrap { position:relative; }
  .search-wrap::before { content:'🔍'; position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:14px; pointer-events:none; }

  .kat-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .kat-tab { padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; border:1.5px solid var(--krem-gelap); background:var(--putih); color:var(--teks-abu); transition:all 0.2s; white-space:nowrap; }
  .kat-tab.active { background:var(--hijau); color:var(--putih); border-color:var(--hijau); }
  .kat-tab:hover:not(.active) { border-color:var(--hijau-mid); color:var(--hijau); }

  .belanja-table { width:100%; border-collapse:collapse; }
  .belanja-table th { text-align:left; font-size:11px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase; color:var(--teks-abu); padding:0 10px 10px; border-bottom:1px solid var(--krem-gelap); }
  .belanja-table td { padding:8px 10px; border-bottom:1px solid var(--krem); vertical-align:middle; font-size:13px; }
  .belanja-table tr:last-child td { border-bottom:none; }
  .belanja-table tr.has-input { background:var(--hijau-pale); }

  .belanja-table input[type=number] { width:100%; padding:7px 10px; border:1.5px solid var(--krem-gelap); border-radius:8px; font-size:13px; font-family:'DM Sans',sans-serif; outline:none; text-align:right; background:var(--putih); }
  .belanja-table input[type=number]:focus { border-color:var(--hijau-mid); background:#fff; }
  .belanja-table .nama-cell { font-weight:500; }
  .belanja-table .kat-badge { display:inline-block; padding:2px 8px; border-radius:6px; font-size:10px; font-weight:600; background:var(--krem-gelap); color:var(--teks-abu); }
  .belanja-table .subtotal { font-weight:700; color:var(--hijau); text-align:right; min-width:100px; }
  .belanja-table .keterangan-input { width:100%; padding:6px 8px; border:1.5px solid var(--krem-gelap); border-radius:8px; font-size:12px; font-family:'DM Sans',sans-serif; outline:none; }
  .belanja-table .keterangan-input:focus { border-color:var(--hijau-mid); }

  .total-bar { display:flex; justify-content:space-between; align-items:center; padding:16px 20px; background:var(--hijau-tua); border-radius:12px; margin-top:20px; }
  .total-bar .tl { color:rgba(255,255,255,0.7); font-size:13px; }
  .total-bar .tr-val { color:var(--putih); font-size:20px; font-weight:700; }
  .total-bar .tr-item { color:var(--hijau-muda); font-size:12px; margin-top:2px; }

  .btn-simpan { padding:12px 28px; background:linear-gradient(135deg,var(--hijau),var(--hijau-mid)); color:var(--putih); border:none; border-radius:12px; font-size:14px; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; box-shadow:0 4px 16px rgba(45,106,79,0.3); transition:all 0.2s; }
  .btn-simpan:hover { opacity:0.9; transform:translateY(-1px); }
  .btn-simpan:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  .btn-reset { padding:12px 20px; background:var(--krem-gelap); color:var(--teks-abu); border:none; border-radius:12px; font-size:14px; font-weight:500; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.2s; }
  .btn-reset:hover { background:var(--krem); }

  .tambah-item-form { background:var(--krem); border-radius:12px; padding:16px; margin-top:16px; display:none; }
  .tambah-item-form.open { display:block; }
  .tambah-grid { display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:10px; align-items:end; }
  .tambah-grid input, .tambah-grid select { padding:9px 12px; border:1.5px solid var(--krem-gelap); border-radius:10px; font-size:13px; font-family:'DM Sans',sans-serif; background:var(--putih); outline:none; width:100%; }
  .tambah-grid input:focus, .tambah-grid select:focus { border-color:var(--hijau-mid); }
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar"></aside>
<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="topbar-left"><h1>Input Belanja</h1><div class="breadcrumb">Catat pengeluaran harian cafe</div></div>
    </div>
  </div>
  <div class="page-content">
    <div class="card">
      <div class="card-header">
        <div class="card-title">🛒 Form Belanja</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <div><label style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--teks-abu);">Tanggal</label>
            <input type="date" id="tglBelanja"></div>
        </div>
      </div>

      <div class="belanja-toolbar">
        <div class="search-wrap">
          <input class="search-input" type="text" id="searchItem" placeholder="Cari item..." oninput="filterTable()">
        </div>
        <button class="btn-secondary" onclick="toggleTambahItem()">+ Tambah Item Baru</button>
      </div>

      <div class="kat-tabs" id="katTabs"></div>

      <!-- Form tambah item baru -->
      <div class="tambah-item-form" id="tambahItemForm">
        <div style="font-size:13px;font-weight:600;color:var(--hijau-tua);margin-bottom:10px;">Tambah Item Baru ke Master Belanja</div>
        <div class="tambah-grid">
          <div><label style="font-size:11px;font-weight:600;text-transform:uppercase;color:var(--teks-abu);display:block;margin-bottom:4px;">Nama Item</label>
            <input type="text" id="newNama" placeholder="Nama barang"></div>
          <div><label style="font-size:11px;font-weight:600;text-transform:uppercase;color:var(--teks-abu);display:block;margin-bottom:4px;">Kategori</label>
            <select id="newKat">
              <option>Bahan Baku</option><option>Bahan Penunjang</option><option>Bumbu Masak</option>
              <option>Frozen Food</option><option>Kemasan</option><option>Minum Kemasan</option>
              <option>Buah-buahan</option><option>Sayuran</option><option>Operasional</option><option>Lain-lain</option>
            </select></div>
          <div><label style="font-size:11px;font-weight:600;text-transform:uppercase;color:var(--teks-abu);display:block;margin-bottom:4px;">Satuan</label>
            <input type="text" id="newSatuan" placeholder="kg / pcs / botol"></div>
          <div><button class="btn-primary" onclick="simpanItemBaru()" style="white-space:nowrap;">Simpan Item</button></div>
        </div>
      </div>

      <div id="belanjaContainer"><div class="loading-state"><div class="loading-spinner"></div>Memuat daftar belanja...</div></div>

      <div class="total-bar">
        <div class="tl">Total Belanja</div>
        <div>
          <div class="tr-val" id="totalBelanja">Rp 0</div>
          <div class="tr-item" id="totalItem">0 item diisi</div>
        </div>
      </div>

      <div style="display:flex;gap:10px;margin-top:16px;">
        <button class="btn-simpan" id="btnSimpan" onclick="simpanBelanja()">💾 Simpan Belanja</button>
        <button class="btn-reset" onclick="resetForm()">↺ Reset</button>
      </div>
      <div id="simpanStatus" style="margin-top:10px;font-size:13px;"></div>
    </div>
  </div>
</main>

<script src="_app.js"></script>
<script>
const API_URL = localStorage.getItem('zaytun_api')||'';
let masterData = [];
let activeKat  = 'Semua';

initPage('belanja');

// Default tanggal hari ini
const now = new Date();
document.getElementById('tglBelanja').value = now.toISOString().split('T')[0];

loadMaster();

async function loadMaster() {
  try {
    const res  = await fetch(`${API_URL}?action=getMasterBelanja`);
    const data = await res.json();
    if (data.status === 'ok') { masterData = data.data; buildKatTabs(); renderTable(); }
  } catch(e) { document.getElementById('belanjaContainer').innerHTML = '<div class="empty-state">⚠️ Gagal memuat daftar belanja</div>'; }
}

function buildKatTabs() {
  const kats = ['Semua', ...new Set(masterData.map(m => m.kategori))];
  const html = kats.map(k => `<div class="kat-tab${k===activeKat?' active':''}" onclick="setKat('${k}')">${k}</div>`).join('');
  document.getElementById('katTabs').innerHTML = html;
}

function setKat(kat) {
  activeKat = kat;
  buildKatTabs();
  renderTable();
}

function filterTable() { renderTable(); }

function renderTable() {
  const q   = document.getElementById('searchItem').value.toLowerCase();
  let data  = masterData;
  if (activeKat !== 'Semua') data = data.filter(m => m.kategori === activeKat);
  if (q) data = data.filter(m => m.nama_item.toLowerCase().includes(q));

  if (!data.length) { document.getElementById('belanjaContainer').innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div>Tidak ada item ditemukan</div>'; return; }

  let html = `<table class="belanja-table">
    <thead><tr>
      <th style="width:36%;">Nama Item</th>
      <th style="width:13%;">Kategori</th>
      <th style="width:12%;">Satuan</th>
      <th style="width:14%;">Jumlah Beli</th>
      <th style="width:14%;">Harga Satuan</th>
      <th style="width:12%;">Total</th>
    </tr></thead><tbody>`;

  data.forEach(item => {
    html += `<tr id="row-${item.id_item}">
      <td class="nama-cell">${item.nama_item}</td>
      <td><span class="kat-badge">${item.kategori}</span></td>
      <td style="color:var(--teks-abu);">${item.satuan}</td>
      <td><input type="number" min="0" step="0.1" placeholder="0" id="qty-${item.id_item}" oninput="hitungSubtotal('${item.id_item}')"></td>
      <td><input type="number" min="0" placeholder="0" id="harga-${item.id_item}" oninput="hitungSubtotal('${item.id_item}')"></td>
      <td class="subtotal" id="sub-${item.id_item}">—</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  document.getElementById('belanjaContainer').innerHTML = html;
  hitungTotal();
}

function hitungSubtotal(id) {
  const qty   = parseFloat(document.getElementById(`qty-${id}`)?.value)   || 0;
  const harga = parseFloat(document.getElementById(`harga-${id}`)?.value) || 0;
  const sub   = qty * harga;
  const subEl = document.getElementById(`sub-${id}`);
  if (subEl) subEl.textContent = sub > 0 ? rp(sub) : '—';
  // Highlight baris jika ada isian
  const row = document.getElementById(`row-${id}`);
  if (row) row.classList.toggle('has-input', qty > 0);
  hitungTotal();
}

function hitungTotal() {
  let total = 0; let count = 0;
  masterData.forEach(item => {
    const qty   = parseFloat(document.getElementById(`qty-${item.id_item}`)?.value)   || 0;
    const harga = parseFloat(document.getElementById(`harga-${item.id_item}`)?.value) || 0;
    if (qty > 0) { total += qty * harga; count++; }
  });
  document.getElementById('totalBelanja').textContent = rp(total);
  document.getElementById('totalItem').textContent    = `${count} item diisi`;
}

async function simpanBelanja() {
  const tgl  = document.getElementById('tglBelanja').value;
  if (!tgl) { alert('Pilih tanggal belanja terlebih dahulu'); return; }
  const user = JSON.parse(localStorage.getItem('zaytun_user')||'{}');
  const items = [];
  masterData.forEach(item => {
    const qty   = parseFloat(document.getElementById(`qty-${item.id_item}`)?.value)   || 0;
    const harga = parseFloat(document.getElementById(`harga-${item.id_item}`)?.value) || 0;
    if (qty > 0) items.push({ id_item:item.id_item, nama_item:item.nama_item, kategori:item.kategori, satuan:item.satuan, jumlah_beli:qty, harga_satuan:harga, keterangan:'' });
  });
  if (!items.length) { alert('Belum ada item yang diisi'); return; }
  const btn = document.getElementById('btnSimpan');
  btn.disabled = true; btn.textContent = '⏳ Menyimpan...';
  try {
    const res  = await fetch(API_URL, { method:'POST', body:JSON.stringify({ action:'simpanBelanja', items, tanggal:fmtDate(tgl), kasir:user.username||'admin' }) });
    const data = await res.json();
    if (data.status === 'ok') {
      document.getElementById('simpanStatus').innerHTML = `<span style="color:var(--hijau);">✅ ${data.message} — Total: ${rp(data.total)}</span>`;
      resetForm();
    } else { document.getElementById('simpanStatus').innerHTML = `<span style="color:var(--merah);">❌ ${data.message}</span>`; }
  } catch(e) { document.getElementById('simpanStatus').innerHTML = `<span style="color:var(--merah);">❌ Gagal konek ke server</span>`; }
  finally { btn.disabled = false; btn.textContent = '💾 Simpan Belanja'; }
}

function resetForm() { masterData.forEach(item => { const q = document.getElementById(`qty-${item.id_item}`); const h = document.getElementById(`harga-${item.id_item}`); if(q) q.value=''; if(h) h.value=''; hitungSubtotal(item.id_item); }); }

function toggleTambahItem() { document.getElementById('tambahItemForm').classList.toggle('open'); }

async function simpanItemBaru() {
  const nama   = document.getElementById('newNama').value.trim();
  const kat    = document.getElementById('newKat').value;
  const satuan = document.getElementById('newSatuan').value.trim();
  if (!nama || !satuan) { alert('Nama dan satuan wajib diisi'); return; }
  try {
    const res  = await fetch(API_URL, { method:'POST', body:JSON.stringify({ action:'tambahItemBelanja', nama_item:nama, kategori:kat, satuan }) });
    const data = await res.json();
    if (data.status === 'ok') {
      document.getElementById('newNama').value = '';
      document.getElementById('newSatuan').value = '';
      document.getElementById('tambahItemForm').classList.remove('open');
      loadMaster();
    } else { alert('Gagal: ' + data.message); }
  } catch(e) { alert('Gagal konek ke server'); }
}
</script>
</body>
</html>
