<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Belanja — Zaytun Riverside</title>
<link rel="icon" type="image/png" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_layout.css">
<style>
  body { font-family:'Inter',sans-serif; }

  /* ── ENTRY CARD ── */
  .entry-card {
    background: var(--krem);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 10px;
    border: 1.5px solid var(--krem-gelap);
    transition: border-color 0.2s, background 0.2s;
  }
  .entry-card.filled { border-color: var(--hijau-mid); background: var(--hijau-pale); }

  .entry-grid {
    display: grid;
    grid-template-columns: 1fr 100px 130px 130px 100px 34px;
    gap: 10px;
    align-items: end;
  }
  .entry-grid label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--teks-abu);
    display: block; margin-bottom: 4px;
  }
  .entry-grid input[type=number],
  .entry-grid input[type=text] {
    width: 100%; padding: 9px 12px; box-sizing: border-box;
    border: 1.5px solid var(--krem-gelap); border-radius: 10px;
    font-size: 13px; font-family:'Inter',sans-serif;
    background: var(--putih); outline: none; transition: border-color 0.2s;
  }
  .entry-grid input:focus { border-color: var(--hijau-mid); }
  

  /* subtotal inline */
  .baris-subtotal {
    margin-top: 8px; text-align: right;
    font-size: 12px; color: var(--teks-abu);
  }
  .baris-subtotal span { font-weight: 700; color: var(--hijau); font-size: 14px; }

  /* ── SEARCHABLE ITEM PICKER ── */
  .item-picker-wrap { position: relative; }
  .item-search-input {
    width: 100%; padding: 9px 12px; box-sizing: border-box;
    border: 1.5px solid var(--krem-gelap); border-radius: 10px;
    font-size: 13px; font-family:'Inter',sans-serif;
    background: var(--putih); outline: none; transition: border-color 0.2s;
  }
  .item-search-input:focus { border-color: var(--hijau-mid); }
  .item-search-input.selected {
    border-color: var(--hijau); background: var(--hijau-pale);
    font-weight: 600; color: var(--hijau-tua);
  }
  .item-dropdown {
    display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--putih); border: 1.5px solid var(--hijau-mid);
    border-radius: 10px; max-height: 220px; overflow-y: auto;
    z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }
  .item-dropdown.open { display: block; }
  .item-opt {
    padding: 9px 14px; cursor: pointer; font-size: 13px;
    border-bottom: 1px solid var(--krem); transition: background 0.15s;
    display: flex; justify-content: space-between; align-items: center;
  }
  .item-opt:last-child { border-bottom: none; }
  .item-opt:hover, .item-opt.focused { background: var(--hijau-pale); }
  .item-opt .opt-nama { font-weight: 500; color: var(--teks); }
  .item-opt .opt-kat {
    font-size: 10px; font-weight: 600; padding: 2px 7px;
    border-radius: 6px; background: var(--krem-gelap); color: var(--teks-abu);
    white-space: nowrap; margin-left: 8px; flex-shrink: 0;
  }
  .item-opt-empty { padding: 14px; text-align: center; color: var(--teks-abu); font-size: 13px; }

  /* ── TAMBAH BARIS ── */
  .btn-add-row {
    width: 100%; padding: 12px; border-radius: 12px;
    border: 2px dashed var(--hijau-mid); background: transparent;
    color: var(--hijau); font-size: 13px; font-weight: 600;
    font-family:'Inter',sans-serif; cursor: pointer;
    transition: all 0.2s; margin-bottom: 16px;
  }
  .btn-add-row:hover { background: var(--hijau-pale); }
  .btn-add-row:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-remove {
    width: 34px; height: 34px; border-radius: 8px;
    border: 1.5px solid #e5b3b3; background: #fff5f5;
    color: #c0392b; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .btn-remove:hover { background: #fde8e8; border-color: #c0392b; }

  /* ── TOTAL BAR ── */
  .total-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px; background: var(--hijau-tua);
    border-radius: 12px; margin-bottom: 16px;
  }
  .total-bar .tl { color: rgba(255,255,255,0.7); font-size: 13px; }
  .total-bar .tr-val { color: var(--putih); font-size: 20px; font-weight: 700; }
  .total-bar .tr-item { color: var(--hijau-muda); font-size: 12px; margin-top: 2px; }

  /* ── TOOLBAR ── */
  .belanja-toolbar {
    display: flex; gap: 12px; align-items: flex-end;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .field-wrap label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--teks-abu);
    display: block; margin-bottom: 4px;
  }
  .field-wrap input[type=date] {
    padding: 9px 12px; border: 1.5px solid var(--krem-gelap);
    border-radius: 10px; font-size: 13px; font-family:'Inter',sans-serif;
    background: var(--putih); outline: none;
  }
  .field-wrap input[type=date]:focus { border-color: var(--hijau-mid); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.45); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--putih); border-radius: 16px;
    padding: 28px; width: 440px; max-width: 95vw;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-title { font-size: 15px; font-weight: 700; color: var(--hijau-tua); margin-bottom: 18px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
    text-transform: uppercase; color: var(--teks-abu);
    display: block; margin-bottom: 5px;
  }
  .modal-field input, .modal-field select {
    width: 100%; padding: 9px 12px; box-sizing: border-box;
    border: 1.5px solid var(--krem-gelap); border-radius: 10px;
    font-size: 13px; font-family:'Inter',sans-serif;
    background: var(--putih); outline: none;
  }
  .modal-field input:focus, .modal-field select:focus { border-color: var(--hijau-mid); }
  .kat-toggle {
    font-size: 11px; color: var(--hijau); cursor: pointer;
    font-weight: 600; margin-top: 6px; display: inline-block;
  }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions button { flex: 1; }
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar"></aside>
<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="topbar-left">
        <h1>Input Belanja</h1>
        <div class="breadcrumb">Catat pengeluaran harian cafe</div>
      </div>
    </div>
    <div class="topbar-right"></div>
  </div>

  <div class="page-content">
    <div class="card">
      <div class="card-header">
        <div class="card-title">🛒 Form Belanja</div>
      </div>

      <!-- Toolbar: tanggal + tombol tambah item -->
      <div class="belanja-toolbar">
        <div class="field-wrap">
          <label>Tanggal Belanja</label>
          <input type="date" id="tglBelanja">
        </div>
        <button class="btn-secondary" onclick="bukaModalTambahItem()">+ Tambah Item Baru</button>
      </div>

      <!-- Baris belanja -->
      <div id="belanjaRows"></div>

      <!-- Tombol tambah baris -->
      <button class="btn-add-row" id="btnAddRow" onclick="tambahBaris()" disabled>
        ＋ Tambah Item Belanja
      </button>

      <!-- Total -->
      <div class="total-bar">
        <div class="tl">Total Belanja</div>
        <div>
          <div class="tr-val" id="totalBelanja">Rp 0</div>
          <div class="tr-item" id="totalItem">0 item diisi</div>
        </div>
      </div>

      <!-- Aksi -->
      <div style="display:flex;gap:10px;">
        <button class="btn-simpan" id="btnSimpan" onclick="simpanBelanja()">💾 Simpan Belanja</button>
        <button class="btn-reset" onclick="resetForm()">↺ Reset</button>
      </div>
      <div id="simpanStatus" style="margin-top:10px;font-size:13px;font-family:'Inter',sans-serif;"></div>
    </div>
  </div>
</main>

<!-- ── MODAL TAMBAH ITEM BARU ── -->
<div class="modal-overlay" id="modalTambahItem">
  <div class="modal-box">
    <div class="modal-title">➕ Tambah Item Baru ke Master Belanja</div>
    <div class="modal-field">
      <label>Nama Item</label>
      <input type="text" id="newNama" placeholder="Contoh: Santan Kara 200ml">
    </div>
    <div class="modal-field">
      <label>Kategori</label>
      <div id="katPilihWrap">
        <select id="newKatPilih"></select>
        <span class="kat-toggle" onclick="toggleKatBaru(true)">+ Buat kategori baru</span>
      </div>
      <div id="katBaruWrap" style="display:none;">
        <input type="text" id="newKatBaru" placeholder="Nama kategori baru...">
        <span class="kat-toggle" onclick="toggleKatBaru(false)">← Pilih dari yang ada</span>
      </div>
    </div>
    <div class="modal-field">
      <label>Satuan</label>
      <input type="text" id="newSatuan" placeholder="kg / pcs / botol / liter">
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="tutupModalTambahItem()">Batal</button>
      <button class="btn-primary" onclick="simpanItemBaru()">Simpan Item</button>
    </div>
  </div>
</div>

<script src="_app.js"></script>
<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let masterData   = [];
let kategoriList = [];
let barisCount   = 0;

// id_item yang sudah dipilih di baris lain (cegah duplikat)
function getSelectedIds() {
  const ids = new Set();
  document.querySelectorAll('[id^="baris-"]').forEach(card => {
    const id = card.id.replace('baris-', '');
    const val = card.dataset.selectedId;
    if (val) ids.add(val);
  });
  return ids;
}

initPage('belanja');
const now = new Date();
document.getElementById('tglBelanja').value = now.toISOString().split('T')[0];

// ══════════════════════════════════════════════
// LOAD MASTER
// ══════════════════════════════════════════════
async function loadMaster(keepRows = false) {
  try {
    const data = await apiGet({ action: 'getMasterBelanja' });
    if (data.status === 'ok') {
      masterData   = data.data || [];
      kategoriList = [...new Set(masterData.map(m => m.kategori).filter(Boolean))].sort();
      document.getElementById('btnAddRow').disabled = false;
      if (!keepRows && document.getElementById('belanjaRows').children.length === 0) {
        tambahBaris();
      }
    }
  } catch(e) {
    document.getElementById('belanjaRows').innerHTML =
      '<div class="empty-state">⚠️ Gagal memuat daftar belanja</div>';
  }
}

loadMaster();

// ══════════════════════════════════════════════
// BARIS BELANJA — dengan searchable item picker
// ══════════════════════════════════════════════
function tambahBaris() {
  barisCount++;
  const id  = barisCount;
  const card = document.createElement('div');
  card.className = 'entry-card';
  card.id = `baris-${id}`;
  card.dataset.selectedId = '';

  card.innerHTML = `
    <div class="entry-grid">
      <div>
        <label>Nama Item</label>
        <div class="item-picker-wrap" id="picker-${id}">
          <input class="item-search-input" type="text" id="search-${id}"
            placeholder="Ketik nama item..."
            autocomplete="off"
            oninput="onSearchInput(${id})"
            onfocus="bukaDropdown(${id})"
            onkeydown="onSearchKey(event, ${id})">
          <div class="item-dropdown" id="dropdown-${id}"></div>
        </div>
      </div>
      <div>
        <label>Kategori</label>
        <input type="text" id="kat-${id}" readonly placeholder="—">
      </div>
      <div>
        <label>Satuan</label>
        <input type="text" id="sat-${id}" placeholder="—">
      </div>
      <div>
        <label>Jumlah Beli</label>
        <input type="number" min="0" step="0.1" placeholder="0"
          id="qty-${id}" oninput="hitungBaris(${id})">
      </div>
      <div>
        <label>Harga Satuan</label>
        <input type="number" min="0" placeholder="0"
          id="harga-${id}" oninput="hitungBaris(${id})">
      </div>
      <div style="display:flex;flex-direction:column;">
        <label style="visibility:hidden;">.</label>
        <button class="btn-remove" onclick="hapusBaris(${id})" title="Hapus baris">✕</button>
      </div>
    </div>
    <div class="baris-subtotal">Total: <span id="sub-${id}">—</span></div>
  `;

  document.getElementById('belanjaRows').appendChild(card);

  // Tutup dropdown kalau klik di luar
  document.addEventListener('click', function handler(e) {
    const picker = document.getElementById(`picker-${id}`);
    if (picker && !picker.contains(e.target)) tutupDropdown(id);
  });
}

function hapusBaris(id) {
  const el = document.getElementById(`baris-${id}`);
  if (el) el.remove();
  hitungGrand();
}

// ── Searchable dropdown ──
function onSearchInput(id) {
  const card = document.getElementById(`baris-${id}`);
  // Kalau user edit ulang teks, reset pilihan
  if (card) card.dataset.selectedId = '';
  const searchEl = document.getElementById(`search-${id}`);
  if (searchEl) searchEl.classList.remove('selected');
  document.getElementById(`kat-${id}`).value = '';
  document.getElementById(`sat-${id}`).value = '';
  document.getElementById(`qty-${id}`).value = '';
  document.getElementById(`harga-${id}`).value = '';
  document.getElementById(`sub-${id}`).textContent = '—';
  if (card) card.classList.remove('filled');
  hitungGrand();
  bukaDropdown(id);
}

function bukaDropdown(id) {
  renderDropdown(id);
  document.getElementById(`dropdown-${id}`).classList.add('open');
}

function tutupDropdown(id) {
  const dd = document.getElementById(`dropdown-${id}`);
  if (dd) dd.classList.remove('open');
}

function renderDropdown(id) {
  const q          = (document.getElementById(`search-${id}`)?.value || '').toLowerCase().trim();
  const selectedIds = getSelectedIds();
  const card        = document.getElementById(`baris-${id}`);
  const thisSel     = card?.dataset?.selectedId || '';

  let filtered = masterData.filter(m => {
    // Exclude yang sudah dipilih di baris lain
    if (selectedIds.has(String(m.id_item)) && String(m.id_item) !== thisSel) return false;
    if (!q) return true;
    return m.nama_item.toLowerCase().includes(q) ||
           m.kategori.toLowerCase().includes(q);
  });

  const dd = document.getElementById(`dropdown-${id}`);
  if (!filtered.length) {
    dd.innerHTML = `<div class="item-opt-empty">Tidak ditemukan — <span style="color:var(--hijau);cursor:pointer;font-weight:600;" onclick="bukaModalTambahItem()">+ Tambah item baru</span></div>`;
    return;
  }

  dd.innerHTML = filtered.map((m, idx) => `
    <div class="item-opt" data-idx="${idx}" data-id="${m.id_item}"
      onclick="pilihItem(${id}, '${m.id_item}')">
      <span class="opt-nama">${m.nama_item}</span>
      <span class="opt-kat">${m.kategori}</span>
    </div>
  `).join('');
}

function pilihItem(barisId, idItem) {
  const master = masterData.find(m => String(m.id_item) === String(idItem));
  if (!master) return;

  const card = document.getElementById(`baris-${barisId}`);
  if (card) card.dataset.selectedId = String(idItem);

  const searchEl = document.getElementById(`search-${barisId}`);
  if (searchEl) {
    searchEl.value = master.nama_item;
    searchEl.classList.add('selected');
  }
  document.getElementById(`kat-${barisId}`).value = master.kategori;
  document.getElementById(`sat-${barisId}`).value = master.satuan;

  tutupDropdown(barisId);

  // Fokus ke qty
  const qtyEl = document.getElementById(`qty-${barisId}`);
  if (qtyEl) { qtyEl.focus(); qtyEl.select(); }

  hitungBaris(barisId);
}

// Navigasi keyboard di dropdown
function onSearchKey(e, id) {
  const dd   = document.getElementById(`dropdown-${id}`);
  const opts = dd.querySelectorAll('.item-opt');
  const cur  = dd.querySelector('.item-opt.focused');

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (!cur) { opts[0]?.classList.add('focused'); }
    else {
      cur.classList.remove('focused');
      const next = cur.nextElementSibling;
      (next && next.classList.contains('item-opt') ? next : opts[0])?.classList.add('focused');
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (cur) {
      cur.classList.remove('focused');
      const prev = cur.previousElementSibling;
      (prev && prev.classList.contains('item-opt') ? prev : opts[opts.length-1])?.classList.add('focused');
    }
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (cur) pilihItem(id, cur.dataset.id);
  } else if (e.key === 'Escape') {
    tutupDropdown(id);
  }
}

// ── Hitung ──
function hitungBaris(id) {
  const qty   = parseFloat(document.getElementById(`qty-${id}`)?.value)   || 0;
  const harga = parseFloat(document.getElementById(`harga-${id}`)?.value) || 0;
  const sub   = qty * harga;
  const subEl = document.getElementById(`sub-${id}`);
  const card  = document.getElementById(`baris-${id}`);
  const hasItem = !!card?.dataset?.selectedId;
  if (subEl) subEl.textContent = sub > 0 ? rp(sub) : '—';
  if (card)  card.classList.toggle('filled', qty > 0 && hasItem);
  hitungGrand();
}

function hitungGrand() {
  let total = 0, count = 0;
  document.querySelectorAll('[id^="baris-"]').forEach(card => {
    const id    = card.id.replace('baris-', '');
    const qty   = parseFloat(document.getElementById(`qty-${id}`)?.value)   || 0;
    const harga = parseFloat(document.getElementById(`harga-${id}`)?.value) || 0;
    if (qty > 0 && card.dataset.selectedId) { total += qty * harga; count++; }
  });
  document.getElementById('totalBelanja').textContent = rp(total);
  document.getElementById('totalItem').textContent    = `${count} item diisi`;
}

// ══════════════════════════════════════════════
// SIMPAN BELANJA
// ══════════════════════════════════════════════
async function simpanBelanja() {
  const tgl = document.getElementById('tglBelanja').value;
  if (!tgl) { alert('Pilih tanggal belanja terlebih dahulu'); return; }

  const user  = JSON.parse(localStorage.getItem('zaytun_user') || '{}');
  const items = [];

  document.querySelectorAll('[id^="baris-"]').forEach(card => {
    const id      = card.id.replace('baris-', '');
    const idItem  = card.dataset.selectedId;
    const qty     = parseFloat(document.getElementById(`qty-${id}`)?.value)   || 0;
    const harga   = parseFloat(document.getElementById(`harga-${id}`)?.value) || 0;
    if (!idItem || qty <= 0) return;
    const master = masterData.find(m => String(m.id_item) === String(idItem));
    if (!master) return;
    items.push({
      id_item     : master.id_item,
      nama_item   : master.nama_item,
      kategori    : master.kategori,
      satuan      : document.getElementById(`sat-${id}`)?.value || master.satuan,
      jumlah_beli : qty,
      harga_satuan: harga,
      keterangan  : ''
    });
  });

  if (!items.length) { alert('Belum ada item yang dipilih dan diisi'); return; }

  const btn = document.getElementById('btnSimpan');
  btn.disabled = true; btn.textContent = '⏳ Menyimpan...';

  try {
    const data = await apiPost({
      action  : 'simpanBelanja',
      items,
      tanggal : fmtDate(tgl),
      kasir   : user.username || 'admin'
    });
    if (data.status === 'ok') {
      document.getElementById('simpanStatus').innerHTML =
        `<span style="color:var(--hijau);">✅ ${data.message} — Total: ${rp(data.total)}</span>
        <br><a href="invoice.html?id=${data.id_nota}&type=beli" target="_blank" style="color:var(--hijau);font-weight:600;">🔗 Lihat/Bagikan Nota</a>`;
      resetForm();
    } else {
      document.getElementById('simpanStatus').innerHTML =
        `<span style="color:var(--merah);">❌ ${data.message}</span>`;
    }
  } catch(e) {
    document.getElementById('simpanStatus').innerHTML =
      `<span style="color:var(--merah);">❌ Gagal konek ke server</span>`;
  } finally {
    btn.disabled = false; btn.textContent = '💾 Simpan Belanja';
  }
}

// ══════════════════════════════════════════════
// RESET
// ══════════════════════════════════════════════
function resetForm() {
  document.getElementById('belanjaRows').innerHTML = '';
  barisCount = 0;
  hitungGrand();
  tambahBaris();
  document.getElementById('simpanStatus').innerHTML = '';
}

// ══════════════════════════════════════════════
// MODAL TAMBAH ITEM BARU
// ══════════════════════════════════════════════
function bukaModalTambahItem() {
  const sel = document.getElementById('newKatPilih');
  sel.innerHTML = kategoriList.map(k => `<option value="${k}">${k}</option>`).join('');
  document.getElementById('newNama').value    = '';
  document.getElementById('newKatBaru').value = '';
  document.getElementById('newSatuan').value  = '';
  toggleKatBaru(false);
  document.getElementById('modalTambahItem').classList.add('open');
  setTimeout(() => document.getElementById('newNama').focus(), 100);
}

function tutupModalTambahItem() {
  document.getElementById('modalTambahItem').classList.remove('open');
}

function toggleKatBaru(buat) {
  document.getElementById('katPilihWrap').style.display = buat ? 'none' : 'block';
  document.getElementById('katBaruWrap').style.display  = buat ? 'block' : 'none';
}

async function simpanItemBaru() {
  const nama   = document.getElementById('newNama').value.trim();
  const satuan = document.getElementById('newSatuan').value.trim();
  const modeBaru = document.getElementById('katBaruWrap').style.display !== 'none';
  const kat    = modeBaru
    ? document.getElementById('newKatBaru').value.trim()
    : document.getElementById('newKatPilih').value;

  if (!nama)   { alert('Nama item wajib diisi'); return; }
  if (!kat)    { alert('Kategori wajib diisi'); return; }
  if (!satuan) { alert('Satuan wajib diisi'); return; }

  try {
    const data = await apiPost({ action:'tambahItemBelanja', nama_item:nama, kategori:kat, satuan });
    if (data.status === 'ok') {
      tutupModalTambahItem();
      await loadMaster(true); // reload tanpa reset baris
    } else { alert('Gagal: ' + data.message); }
  } catch(e) { alert('Gagal konek ke server'); }
}

document.getElementById('modalTambahItem').addEventListener('click', function(e) {
  if (e.target === this) tutupModalTambahItem();
});
</script>
</body>
</html>
