<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Penjualan — Zaytun Riverside</title>
<link rel="icon" type="image/png" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_layout.css">
<style>
/* ══════════════════════════════════════════
   LAYOUT UTAMA — SPLIT PANEL (tablet/desktop)
   Mobile: panel bergantian lewat tab
══════════════════════════════════════════ */
.penjualan-wrap {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 16px;
  align-items: start;
}

/* ── PANEL KIRI: Menu picker ── */
.panel-menu { display: flex; flex-direction: column; gap: 12px; }

/* Search + filter */
.menu-toolbar {
  display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
}
.search-wrap { position: relative; flex: 1; min-width: 180px; }
.search-wrap::before {
  content: '🔍'; position: absolute; left: 11px; top: 50%;
  transform: translateY(-50%); font-size: 14px; pointer-events: none;
}
.search-input {
  width: 100%; padding: 10px 12px 10px 36px; box-sizing: border-box;
  border: 1.5px solid var(--krem-gelap); border-radius: 12px;
  font-size: 14px; font-family: 'Inter', sans-serif;
  background: var(--putih); outline: none; transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--hijau-mid); }

/* Kategori chips */
.kat-chips {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.kat-chip {
  padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  border: 1.5px solid var(--krem-gelap); background: var(--putih);
  color: var(--teks-abu); cursor: pointer; transition: all 0.2s;
  white-space: nowrap; font-family: 'Inter', sans-serif;
}
.kat-chip.active { background: var(--hijau); color: var(--putih); border-color: var(--hijau); }
.kat-chip:hover:not(.active) { border-color: var(--hijau-mid); color: var(--hijau); }

/* Grid menu */
.menu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
}
.menu-card {
  background: var(--putih); border-radius: 14px;
  border: 2px solid var(--krem-gelap); padding: 14px 12px;
  cursor: pointer; transition: all 0.18s; text-align: center;
  position: relative; user-select: none; -webkit-tap-highlight-color: transparent;
}
.menu-card:hover { border-color: var(--hijau-mid); background: var(--hijau-pale); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(45,106,79,0.12); }
.menu-card:active { transform: scale(0.97); }
.menu-card.in-order { border-color: var(--hijau); background: var(--hijau-pale); }
.menu-card .mc-nama { font-size: 13px; font-weight: 600; color: var(--teks); margin-bottom: 4px; line-height: 1.3; }
.menu-card .mc-kat  { font-size: 10px; color: var(--teks-abu); margin-bottom: 6px; }
.menu-card .mc-harga { font-size: 13px; font-weight: 700; color: var(--hijau); }
.menu-card.paket-card { background: var(--emas-pale); border-color: rgba(201,168,76,0.35); }
.mc-hemat { font-size: 10px; font-weight: 700; color: #8a6914; background: var(--putih); display: inline-block; padding: 1px 8px; border-radius: 10px; margin-top: 4px; }
.menu-card.tanpanasi-card { background: var(--merah-pale); border-color: rgba(192,57,43,0.25); }
.mc-tag-nasi { font-size: 9px; font-weight: 700; color: var(--merah); background: var(--putih); padding: 1px 6px; border-radius: 8px; vertical-align: middle; }

.si-paket-info { font-size: 11px; color: var(--teks-abu); margin: 2px 0 4px; line-height: 1.5; }
.si-hemat { display: inline-block; margin-left: 6px; font-size: 10px; font-weight: 700; color: #8a6914; background: var(--emas-pale); padding: 1px 7px; border-radius: 10px; }
.si-nasi-toggle { font-size: 11px; font-weight: 600; color: var(--hijau-mid); cursor: pointer; margin: 2px 0 6px; padding: 3px 8px; background: var(--hijau-pale); border-radius: 8px; display: inline-block; }
.si-nasi-toggle.active { background: var(--merah-pale); color: var(--merah); }
.menu-card .mc-badge {
  position: absolute; top: -8px; right: -8px;
  width: 24px; height: 24px; background: var(--hijau); color: var(--putih);
  border-radius: 50%; font-size: 11px; font-weight: 700;
  display: none; align-items: center; justify-content: center;
  border: 2px solid var(--putih); box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
.menu-card.in-order .mc-badge { display: flex; }

/* ── PANEL KANAN: Struk / Order ── */
.panel-struk {
  position: sticky; top: 80px;
  background: var(--putih); border-radius: 16px;
  border: 1.5px solid var(--krem-gelap);
  overflow: hidden; display: flex; flex-direction: column;
  max-height: calc(100vh - 100px);
}

/* Meta: tanggal, kasir, metode */
.struk-meta { padding: 12px 16px; border-bottom: 1px solid var(--krem-gelap); background: var(--krem); }
.meta-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.meta-field { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 100px; }
.meta-field label { font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--teks-abu); text-align: center; }
.meta-field input[type=date],
.meta-field input[type=text] {
  padding: 7px 10px; border: 1.5px solid var(--krem-gelap); border-radius: 8px;
  font-size: 12px; font-family: 'Inter', sans-serif; background: var(--putih);
  outline: none; transition: border-color 0.2s; width: 100%;
  text-align: center;
}
.meta-field input:focus { border-color: var(--hijau-mid); }
.meta-field input[readonly] { background: var(--krem); color: var(--teks-abu); cursor: default; }

/* Metode bayar */
.metode-row { display: flex; gap: 6px; margin-top: 8px; }
.metode-btn {
  flex: 1; padding: 7px 4px; border-radius: 8px; font-size: 11px; font-weight: 600;
  border: 1.5px solid var(--krem-gelap); background: var(--putih);
  color: var(--teks-abu); cursor: pointer; transition: all 0.2s;
  font-family: 'Inter', sans-serif; text-align: center; line-height: 1.3;
}
.metode-btn.active { background: var(--hijau); color: var(--putih); border-color: var(--hijau); }

/* Item list di struk */
.struk-items { flex: 1; overflow-y: auto; padding: 8px 0; }
.struk-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px; border-bottom: 1px solid var(--krem);
  transition: background 0.15s;
}
.struk-item:last-child { border-bottom: none; }
.struk-item:hover { background: var(--krem); }
.si-nama { flex: 1; font-size: 13px; font-weight: 500; color: var(--teks); }
.si-harga { font-size: 11px; color: var(--teks-abu); }
.si-qty-wrap { display: flex; align-items: center; gap: 6px; }
.si-qty-btn {
  width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--krem-gelap);
  background: var(--putih); color: var(--hijau-tua); font-size: 16px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; line-height: 1; padding: 0;
  font-family: 'Inter', sans-serif;
}
.si-qty-btn:hover { background: var(--hijau); color: var(--putih); border-color: var(--hijau); }
.si-qty-btn.minus:hover { background: var(--merah); border-color: var(--merah); }
.si-qty { font-size: 14px; font-weight: 700; min-width: 22px; text-align: center; color: var(--teks); }
.si-sub { font-size: 13px; font-weight: 700; color: var(--hijau); min-width: 80px; text-align: right; }
.si-harga-input {
  width: 90px; padding: 5px 8px; border: 1.5px solid var(--krem-gelap); border-radius: 7px;
  font-size: 12px; font-family: 'Inter', sans-serif; text-align: right;
  background: var(--putih); outline: none;
}
.si-harga-input:focus { border-color: var(--hijau-mid); }

.struk-empty {
  padding: 32px 20px; text-align: center; color: var(--teks-abu); font-size: 13px;
}
.struk-empty .se-icon { font-size: 32px; margin-bottom: 8px; }

/* Total & footer */
.struk-footer { border-top: 1.5px dashed var(--krem-gelap); padding: 12px 16px; }
.total-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
.total-row .tr-label { font-size: 12px; color: var(--teks-abu); }
.total-row .tr-val   { font-size: 13px; font-weight: 600; color: var(--teks); }
.total-row.grand {
  margin-top: 8px; padding: 8px 10px;
  border: 1.5px solid var(--hijau); border-radius: 10px;
  background: var(--hijau-pale);
}
.total-row.grand .tr-label { font-size: 12px; font-weight: 700; color: var(--hijau-tua); }
.total-row.grand .tr-val   { font-size: 13px; font-weight: 700; color: var(--hijau-tua); }
.diskon-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
.diskon-row input { width: 100px; padding: 5px 8px; border: 1.5px solid var(--merah-pale); border-radius: 6px; font-size: 13px; font-weight: 600; text-align: right; font-family: 'Inter', sans-serif; }
.diskon-row input:focus { outline: none; border-color: var(--merah); }

/* Kembalian — 2 kolom jelas: Uang Cash | Kembalian */
.kembalian-wrap { margin-top: 10px; background: var(--krem); border-radius: 10px; padding: 10px 12px; }
.kembalian-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.kembalian-col label { font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--teks-abu); display: block; margin-bottom: 4px; }
.kembalian-col input {
  width: 100%; height: 40px; padding: 0 10px; border: 1.5px solid var(--krem-gelap); border-radius: 8px;
  font-size: 14px; font-family: 'Inter', sans-serif; text-align: right;
  background: var(--putih); outline: none; box-sizing: border-box;
}
.kembalian-col input:focus { border-color: var(--hijau-mid); }
.kembalian-col .kembalian-val {
  height: 40px; font-size: 14px; font-weight: 700; color: var(--hijau); text-align: right;
  padding: 0 10px; background: var(--putih); border-radius: 8px; border: 1.5px solid var(--krem-gelap);
  display: flex; align-items: center; justify-content: flex-end; box-sizing: border-box;
}
.kembalian-val.kurang { color: var(--merah); }

/* Tombol aksi struk — Simpan&Cetak menyesuaikan tinggi Draft+Reset (bukan kotak) */
.struk-actions { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--krem-gelap); }
.aksi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: stretch; }
.btn-simpan-trx {
  width: 100%;
  background: linear-gradient(135deg, var(--hijau), var(--hijau-mid));
  color: var(--putih); border: none; border-radius: 12px; font-size: 13px; font-weight: 700;
  font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(45,106,79,0.25);
  display: flex; flex-direction: row; align-items: center; justify-content: center; gap: 8px;
  line-height: 1.25;
}
.btn-simpan-trx span:first-child { font-size: 18px; }
.btn-simpan-trx:hover { opacity: 0.9; }
.btn-simpan-trx:disabled { opacity: 0.5; cursor: not-allowed; }
.aksi-kanan { display: flex; flex-direction: column; gap: 8px; }
.aksi-kanan button { height: 40px; padding: 0; display: flex; align-items: center; justify-content: center; }
.btn-draft {
  background: var(--emas-pale); color: #8a6914;
  border: 1.5px solid rgba(201,168,76,0.4); border-radius: 10px;
  font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif;
  cursor: pointer; transition: all 0.2s;
}
.btn-draft:hover { background: #f5e8b0; }
.btn-reset-struk {
  padding: 10px; background: var(--krem-gelap); color: var(--teks-abu);
  border: none; border-radius: 10px; font-size: 13px; font-weight: 500;
  font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s;
}
.btn-reset-struk:hover { background: var(--krem); color: var(--teks); }

/* Status */
.simpan-status { font-size: 12px; font-family: 'Inter', sans-serif; text-align: center; min-height: 18px; }

/* ══════════════════════════════════════════
   DAFTAR DRAFT
══════════════════════════════════════════ */
.draft-list { display: flex; flex-direction: column; gap: 8px; }
.draft-item {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--krem); border-radius: 10px; padding: 10px 14px;
  border: 1.5px solid var(--krem-gelap); cursor: pointer; transition: all 0.2s;
}
.draft-item:hover { border-color: var(--emas); background: var(--emas-pale); }
.di-left .di-no   { font-size: 12px; font-weight: 700; color: var(--hijau-tua); }
.di-left .di-info { font-size: 11px; color: var(--teks-abu); margin-top: 2px; }
.di-right { display: flex; gap: 6px; align-items: center; }
.di-total { font-size: 13px; font-weight: 700; color: var(--hijau); }
.btn-del-draft {
  width: 26px; height: 26px; border-radius: 6px; border: none;
  background: var(--merah-pale); color: var(--merah); font-size: 13px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* ══════════════════════════════════════════
   MOBILE: Tab switcher
══════════════════════════════════════════ */
.mobile-tabs {
  display: none;
  background: var(--putih); border-radius: 12px;
  padding: 4px; gap: 4px; margin-bottom: 12px;
  border: 1.5px solid var(--krem-gelap);
}
.mobile-tab {
  flex: 1; padding: 9px 8px; border-radius: 9px; border: none; background: transparent;
  font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif;
  color: var(--teks-abu); cursor: pointer; transition: all 0.2s; text-align: center;
}
.mobile-tab.active { background: var(--hijau); color: var(--putih); }
.mobile-tab .tab-badge {
  display: inline-block; background: var(--merah); color: var(--putih);
  border-radius: 10px; font-size: 10px; padding: 1px 5px; margin-left: 4px;
}

/* ══════════════════════════════════════════
   PRINT — Struk Termal 58mm
   Render di iframe tersembunyi
══════════════════════════════════════════ */
#printFrame { display: none; }

@media print {
  /* Semua hide kecuali isi print */
  body > *:not(#printMount) { display: none !important; }
  #printMount { display: block !important; }
}

/* ══════════════════════════════════════════
   PRINTER BLUETOOTH PANEL
══════════════════════════════════════════ */
.printer-panel { background:var(--krem); border-radius:10px; padding:10px 12px; margin:10px 0; }
.printer-row { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:4px 0; }
.printer-badge { font-size:12px; font-weight:600; padding:4px 10px; border-radius:20px; }
.printer-badge.printer-connected    { background:var(--hijau-pale); color:var(--hijau); }
.printer-badge.printer-connecting   { background:var(--emas-pale); color:#8a6914; }
.printer-badge.printer-disconnected { background:var(--merah-pale); color:var(--merah); }
.btn-printer-connect { background:var(--putih); border:1.5px solid var(--krem-gelap); border-radius:8px; padding:6px 12px; font-size:12px; font-weight:600; cursor:pointer; color:var(--teks); }
.btn-printer-connect:hover { background:var(--hijau); color:var(--putih); border-color:var(--hijau); }
.paper-select { padding:5px 10px; border:1.5px solid var(--krem-gelap); border-radius:8px; font-size:12px; font-family:'Inter',sans-serif; background:var(--putih); }

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media (max-width: 860px) {
  .penjualan-wrap { grid-template-columns: 1fr; }
  .panel-struk {
    position: static;
    max-height: none;
    height: calc(100vh - 128px); /* topbar + mobile-tabs — item list scroll internal, tombol aksi tetap kelihatan */
  }
  .mobile-tabs { display: flex; }
  .panel-menu.hidden-mobile  { display: none; }
  .panel-struk.hidden-mobile { display: none; }
}
@media (max-width: 500px) {
  .menu-grid { grid-template-columns: repeat(2, 1fr); }

  /* Sembunyikan field Kasir di HP kecil — cuma info, tidak perlu makan tempat */
  .meta-field.field-kasir { display: none; }
  .meta-row .meta-field.field-tanggal { flex: 1 1 100%; }

  /* Tombol aksi ditumpuk vertikal, lebih besar & mudah ditekan jempol */
  .btn-row { flex-direction: column; }
  .btn-row button { width: 100%; padding: 12px; }

  /* Kontrol qty diperbesar biar gampang disentuh */
  .si-qty-btn { width: 32px; height: 32px; font-size: 18px; }
  .si-nama { font-size: 14px; }

  /* Metode bayar: ikon lebih besar, teks tetap ringkas */
  .metode-btn { padding: 10px 4px; font-size: 12px; }
}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar"></aside>
<main class="main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="topbar-left">
        <h1>Input Penjualan</h1>
        <div class="breadcrumb">Catat transaksi manual</div>
      </div>
    </div>
    <div class="topbar-right" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <span class="printer-badge printer-disconnected" id="printerBadge">🔴 Printer</span>
      <button class="btn-printer-connect" onclick="connectPrinterBLE()">🔗 Hubungkan</button>
      <input type="date" id="tglRekapHarian" class="paper-select" title="Tanggal rekap yang akan dicetak" style="padding:5px 8px;">
      <button class="btn-secondary" onclick="cetakRekapHarian()" id="btnRekapHarian" style="font-size:12px;">
        🧾 Rekap Harian
      </button>
      <button class="btn-secondary" onclick="bukaModalDraft()" id="btnLihatDraft" style="font-size:12px;">
        📋 Draft <span id="draftCount" style="display:none;background:var(--merah);color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:4px;">0</span>
      </button>
    </div>
  </div>

  <div class="page-content">
    <!-- Mobile tab switcher -->
    <div class="mobile-tabs" id="mobileTabs">
      <button class="mobile-tab active" onclick="switchTab('menu')">🍽️ Menu</button>
      <button class="mobile-tab" onclick="switchTab('struk')" id="tabStruk">
        🧾 Struk <span class="tab-badge" id="tabBadge" style="display:none;">0</span>
      </button>
    </div>

    <div class="penjualan-wrap">
      <!-- ── PANEL KIRI: Pilih Menu ── -->
      <div class="panel-menu" id="panelMenu">
        <div class="card" style="padding:16px;">
          <div class="menu-toolbar">
            <div class="search-wrap">
              <input class="search-input" type="text" id="searchMenu"
                placeholder="Cari nama menu atau kategori..."
                oninput="filterMenu()">
            </div>
          </div>
          <div class="kat-chips" id="katChips" style="margin-top:10px;"></div>
        </div>
        <div class="menu-grid" id="menuGrid">
          <div class="loading-state" style="grid-column:1/-1;"><div class="loading-spinner"></div>Memuat menu...</div>
        </div>
      </div>

      <!-- ── PANEL KANAN: Struk ── -->
      <div class="panel-struk" id="panelStruk">
        <!-- Meta -->
        <div class="struk-meta">
          <div class="meta-row">
            <div class="meta-field field-tanggal">
              <label>Tanggal Struk</label>
              <input type="date" id="tglTrx">
            </div>
            <div class="meta-field field-kasir">
              <label>Kasir</label>
              <input type="text" id="kasirTrx" readonly>
            </div>
          </div>
          <!-- Metode bayar -->
          <div class="metode-row" style="margin-top:10px;">
            <button class="metode-btn active" data-val="Tunai"         onclick="setMetode(this)">Tunai</button>
            <button class="metode-btn"        data-val="QRIS"          onclick="setMetode(this)">QRIS</button>
            <button class="metode-btn"        data-val="Bank Transfer" onclick="setMetode(this)">Transfer</button>
          </div>
        </div>

        <!-- Item list -->
        <div class="struk-items" id="strukItems">
          <div class="struk-empty"><div class="se-icon">🍽️</div>Pilih menu dari sebelah kiri</div>
        </div>

        <!-- Footer total -->
        <div class="struk-footer">
          <div class="total-row">
            <span class="tr-label">Subtotal</span>
            <span class="tr-val" id="totalSub">Rp 0</span>
          </div>

          <!-- Diskon custom (opsional) -->
          <div class="diskon-row">
            <span class="tr-label" style="color:var(--merah);">💸 Diskon</span>
            <input type="number" id="inpDiskonCustom" placeholder="0" oninput="hitungTotal()">
          </div>

          <div class="total-row grand">
            <span class="tr-label">TOTAL</span>
            <span class="tr-val" id="totalGrand">Rp 0</span>
          </div>

          <!-- Kembalian — hanya Tunai, 2 kolom jelas -->
          <div class="kembalian-wrap" id="kembalianWrap">
            <div class="kembalian-2col">
              <div class="kembalian-col">
                <label>Uang Cash</label>
                <input type="number" id="uangDiterima" placeholder="0" oninput="hitungKembalian()">
              </div>
              <div class="kembalian-col">
                <label>Kembalian</label>
                <div class="kembalian-val" id="kembalianVal">—</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Aksi -->
        <div class="struk-actions">
          <div class="aksi-grid">
            <button class="btn-simpan-trx" id="btnSimpan" onclick="simpanTransaksi()">
              <span>🖨️</span>
              <span>Simpan & Cetak</span>
            </button>
            <div class="aksi-kanan">
              <button class="btn-draft" onclick="simpanDraft()">📋 Simpan Draft</button>
              <button class="btn-reset-struk" onclick="resetStruk()">🔄 Reset</button>
            </div>
          </div>
          <div class="simpan-status" id="simpanStatus"></div>
        </div>
      </div>
    </div>

    <!-- Daftar Draft -->
    <div class="card" style="margin-top:16px;display:none;" id="cardDraft">
      <div class="card-header">
        <div class="card-title">📋 Draft Tersimpan</div>
        <span class="card-badge badge-emas" id="draftBadgeKartu">0 draft</span>
      </div>
      <div class="draft-list" id="draftList"></div>
    </div>
  </div>
</main>

<!-- Modal Draft -->
<div style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:16px;" id="modalDraft">
  <div style="background:var(--putih);border-radius:16px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;">
    <div style="padding:18px 20px;border-bottom:1px solid var(--krem-gelap);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--putih);">
      <span style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--hijau-tua);">📋 Draft Tersimpan</span>
      <button onclick="tutupModalDraft()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--teks-abu);">✕</button>
    </div>
    <div style="padding:16px;" id="modalDraftList"></div>
  </div>
</div>

<!-- Print mount (hidden, diisi JS) -->
<div id="printMount" style="display:none;"></div>
<iframe id="printFrame" style="display:none;" title="Print"></iframe>

<script src="_app.js"></script>
<script src="printer.js"></script>
<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let menuList     = [];
let paketList    = [];
let kategoriList = [];
let activeKat    = 'Semua';
let orderItems   = {};   // { key: { nama_menu, harga, qty, kategori, tipe, ... } }
let metodeBayar  = 'Tunai';
let draftList    = []; // dimuat dari server (sheet draft_transaksi), sinkron lintas device
let currentDraftId = null;

// ── Init ──
initPage('penjualan');
const nowDate = new Date();
document.getElementById('tglTrx').value = toLocalISODate(nowDate);
document.getElementById('tglRekapHarian').value = toLocalISODate(nowDate);
const user = JSON.parse(localStorage.getItem('zaytun_user') || '{}');
document.getElementById('kasirTrx').value = user.username || 'admin';
loadDraftListFromServer();
loadMenu();

// ══════════════════════════════════════════════
// LOAD MENU + PAKET
// ══════════════════════════════════════════════
async function loadMenu() {
  try {
    const [dataMenu, dataPaket] = await Promise.all([
      apiGet({ action: 'getMenuList' }),
      apiGet({ action: 'getPaketList' })
    ]);
    if (dataMenu.status === 'ok') {
      menuList = (dataMenu.data || []).filter(m => m.status !== 'nonaktif'); // sembunyikan menu nonaktif
    }
    if (dataPaket.status === 'ok') {
      paketList = dataPaket.data || [];
    }
    const katMenu = [...new Set(menuList.map(m => m.kategori).filter(Boolean))];
    const adaTanpaNasi = menuList.some(m => m.include_nasi);
    kategoriList = ['Semua', ...(paketList.length ? ['Paket'] : []), ...(adaTanpaNasi ? ['Tanpa Nasi'] : []), ...katMenu].sort((a, b) => {
      if (a === 'Semua') return -1; if (b === 'Semua') return 1;
      if (a === 'Paket') return -1; if (b === 'Paket') return 1;
      if (a === 'Tanpa Nasi') return -1; if (b === 'Tanpa Nasi') return 1;
      return a.localeCompare(b);
    });
    buildKatChips();
    renderMenuGrid();
  } catch(e) {
    document.getElementById('menuGrid').innerHTML =
      '<div class="empty-state" style="grid-column:1/-1;">⚠️ Gagal memuat menu</div>';
  }
}

function buildKatChips() {
  document.getElementById('katChips').innerHTML = kategoriList.map(k => {
    const label = k === 'Paket' ? '🎁 Paket' : k === 'Tanpa Nasi' ? '🚫🍚 Tanpa Nasi' : k;
    return `<button class="kat-chip${k === activeKat ? ' active' : ''}" onclick="setKat('${k}')">${label}</button>`;
  }).join('');
}

function setKat(kat) { activeKat = kat; buildKatChips(); renderMenuGrid(); }
function filterMenu() { renderMenuGrid(); }

function renderMenuGrid() {
  const q = document.getElementById('searchMenu').value.toLowerCase().trim();

  // ── Grup Paket ──
  if (activeKat === 'Paket') {
    let data = paketList;
    if (q) data = data.filter(p => p.nama_paket.toLowerCase().includes(q));
    if (!data.length) {
      document.getElementById('menuGrid').innerHTML =
        '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">🎁</div>Belum ada paket dibuat<br><span style="font-size:12px;color:var(--teks-abu);">Buat paket dulu di halaman Daftar Menu</span></div>';
      return;
    }
    document.getElementById('menuGrid').innerHTML = data.map((p, idx) => {
      const key = 'PAKET::' + p.nama_paket;
      const qty = orderItems[key]?.qty || 0;
      return `<div class="menu-card paket-card${qty > 0 ? ' in-order' : ''}" onclick="tambahPaketByIndex(${idx})">
        <div class="mc-badge">${qty}</div>
        <div class="mc-nama">🎁 ${p.nama_paket}</div>
        <div class="mc-kat">${p.komponen.map(k => k.nama_menu + (k.qty>1?' x'+k.qty:'')).join(' + ')}</div>
        <div class="mc-harga">${rp(p.harga_paket)}</div>
        ${p.hemat > 0 ? `<div class="mc-hemat">Hemat ${rp(p.hemat)}</div>` : ''}
      </div>`;
    }).join('');
    return;
  }

  // ── Grup "Tanpa Nasi" — kloning menu yang include_nasi, harga sudah dipotong ──
  if (activeKat === 'Tanpa Nasi') {
    let data = menuList.filter(m => m.include_nasi);
    if (q) data = data.filter(m => m.nama_menu.toLowerCase().includes(q));
    if (!data.length) {
      document.getElementById('menuGrid').innerHTML =
        '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">🚫🍚</div>Belum ada menu yang ditandai "termasuk nasi"<br><span style="font-size:12px;color:var(--teks-abu);">Atur di halaman Daftar Menu</span></div>';
      return;
    }
    document.getElementById('menuGrid').innerHTML = data.map(m => {
      const key = m.nama_menu + '::tanpanasi';
      const qty = orderItems[key]?.qty || 0;
      const hargaFinal = Math.max(0, (m.harga || 0) - (m.diskon_tanpa_nasi || 0));
      return `<div class="menu-card tanpanasi-card${qty > 0 ? ' in-order' : ''}" onclick="tambahMenuTanpaNasi('${m.nama_menu.replace(/'/g,"\\'")}')">
        <div class="mc-badge">${qty}</div>
        <div class="mc-nama">${m.nama_menu} <span class="mc-tag-nasi">tanpa nasi</span></div>
        <div class="mc-kat">${m.kategori || '—'}</div>
        <div class="mc-harga">${rp(hargaFinal)}</div>
      </div>`;
    }).join('');
    return;
  }

  // ── Grup menu reguler ──
  let data = menuList;
  if (activeKat !== 'Semua') data = data.filter(m => m.kategori === activeKat);
  if (q) data = data.filter(m =>
    m.nama_menu.toLowerCase().includes(q) || (m.kategori||'').toLowerCase().includes(q)
  );

  if (!data.length) {
    document.getElementById('menuGrid').innerHTML =
      '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">🔍</div>Menu tidak ditemukan</div>';
    return;
  }

  document.getElementById('menuGrid').innerHTML = data.map(m => {
    const qty = orderItems[m.nama_menu]?.qty || 0;
    return `<div class="menu-card${qty > 0 ? ' in-order' : ''}" onclick="tambahMenu('${m.nama_menu.replace(/'/g,"\\'")}', ${m.harga || 0}, '${(m.kategori||'').replace(/'/g,"\\'")}')">
      <div class="mc-badge" id="badge-${CSS.escape(m.nama_menu)}">${qty}</div>
      <div class="mc-nama">${m.nama_menu}${m.include_nasi ? ' 🍚' : ''}</div>
      <div class="mc-kat">${m.kategori || '—'}</div>
      <div class="mc-harga">${m.harga ? rp(m.harga) : '—'}</div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
// ORDER MANAGEMENT
// ══════════════════════════════════════════════
function tambahMenu(nama, harga, kategori) {
  if (!orderItems[nama]) {
    const m = menuList.find(x => x.nama_menu === nama) || {};
    orderItems[nama] = {
      nama_menu: nama, harga: harga || 0, hargaAsli: harga || 0, qty: 0, kategori,
      tipe: 'reguler',
      includeNasi: !!m.include_nasi, diskonNasi: m.diskon_tanpa_nasi || 0, tanpaNasi: false
    };
  }
  orderItems[nama].qty++;
  renderStruk();
  renderMenuGrid();
  // Mobile: auto switch ke struk
  if (window.innerWidth <= 860) switchTab('struk');
}

function tambahPaketByIndex(idx) {
  const p = paketList[idx];
  if (p) tambahPaketKeCart(p);
}

function tambahPaketKeCart(paket) {
  const key = 'PAKET::' + paket.nama_paket;
  if (!orderItems[key]) {
    orderItems[key] = {
      nama_menu: paket.nama_paket, harga: paket.harga_paket, hargaAsli: paket.harga_paket,
      qty: 0, kategori: 'Paket', tipe: 'paket',
      komponen: paket.komponen, totalAsli: paket.total_asli, hemat: paket.hemat,
      includeNasi: false, diskonNasi: 0, tanpaNasi: false
    };
  }
  orderItems[key].qty++;
  renderStruk();
  renderMenuGrid();
  if (window.innerWidth <= 860) switchTab('struk');
}

function tambahMenuTanpaNasi(nama) {
  const m = menuList.find(x => x.nama_menu === nama);
  if (!m) return;
  const key = nama + '::tanpanasi';
  if (!orderItems[key]) {
    const hargaFinal = Math.max(0, (m.harga || 0) - (m.diskon_tanpa_nasi || 0));
    orderItems[key] = {
      nama_menu: nama + ' (Tanpa Nasi)', harga: hargaFinal, hargaAsli: m.harga || 0, qty: 0,
      kategori: m.kategori, tipe: 'reguler',
      includeNasi: false, diskonNasi: m.diskon_tanpa_nasi || 0, tanpaNasi: true
    };
  }
  orderItems[key].qty++;
  renderStruk();
  renderMenuGrid();
  if (window.innerWidth <= 860) switchTab('struk');
}

function ubahQty(nama, delta) {
  if (!orderItems[nama]) return;
  orderItems[nama].qty += delta;
  if (orderItems[nama].qty <= 0) delete orderItems[nama];
  renderStruk();
  renderMenuGrid();
}

function ubahHarga(nama, val) {
  if (!orderItems[nama]) return;
  orderItems[nama].harga = parseFloat(val) || 0;
  renderStruk();
}

function renderStruk() {
  const entries = Object.entries(orderItems);
  const container = document.getElementById('strukItems');

  if (!entries.length) {
    container.innerHTML = '<div class="struk-empty"><div class="se-icon">🍽️</div>Pilih menu dari sebelah kiri</div>';
    hitungTotal();
    updateTabBadge();
    return;
  }

  container.innerHTML = entries.map(([key, it]) => {
    const keyEsc = key.replace(/'/g,"\\'");

    const paketInfo = it.tipe === 'paket' ? `
      <div class="si-paket-info">
        ${it.komponen.map(k => k.nama_menu + (k.qty>1?' x'+k.qty:'')).join(' + ')}
        ${it.hemat > 0 ? `<span class="si-hemat">Hemat ${rp(it.hemat)}</span>` : ''}
      </div>` : '';

    const nasiLabel = it.tanpaNasi ? `<div class="si-nasi-toggle active">🚫🍚 Tanpa Nasi (potongan ${rp(it.diskonNasi)})</div>` : '';

    return `
    <div class="struk-item">
      <div style="flex:1;min-width:0;">
        <div class="si-nama">${it.nama_menu}${it.tipe === 'paket' ? ' 🎁' : ''}</div>
        ${paketInfo}
        ${nasiLabel}
        <input class="si-harga-input" type="number" value="${it.harga}"
          placeholder="Harga" oninput="ubahHarga('${keyEsc}', this.value)"
          title="Edit harga">
      </div>
      <div class="si-qty-wrap">
        <button class="si-qty-btn minus" onclick="ubahQty('${keyEsc}', -1)">−</button>
        <span class="si-qty">${it.qty}</span>
        <button class="si-qty-btn" onclick="ubahQty('${keyEsc}', 1)">+</button>
      </div>
      <div class="si-sub">${rp(it.qty * it.harga)}</div>
    </div>`;
  }).join('');

  hitungTotal();
  updateTabBadge();
}

function getDiskonCustom() {
  return Number(document.getElementById('inpDiskonCustom')?.value) || 0;
}

function hitungTotal() {
  const items = Object.values(orderItems);
  const subtotal = items.reduce((s, it) => s + it.qty * it.harga, 0);
  const diskon = getDiskonCustom();
  const total = Math.max(0, subtotal - diskon);
  document.getElementById('totalSub').textContent   = rp(subtotal);
  document.getElementById('totalGrand').textContent = rp(total);
  hitungKembalian();
}

function updateTabBadge() {
  const jml = Object.values(orderItems).reduce((s, it) => s + it.qty, 0);
  const badge = document.getElementById('tabBadge');
  badge.style.display = jml > 0 ? 'inline-block' : 'none';
  badge.textContent   = jml;
}

// ── Metode bayar ──
function setMetode(btn) {
  document.querySelectorAll('.metode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  metodeBayar = btn.dataset.val;
  document.getElementById('kembalianWrap').style.display = metodeBayar === 'Tunai' ? 'block' : 'none';
  hitungKembalian();
}

function hitungKembalian() {
  const subtotal = Object.values(orderItems).reduce((s, it) => s + it.qty * it.harga, 0);
  const total    = Math.max(0, subtotal - getDiskonCustom());
  const diterima = parseFloat(document.getElementById('uangDiterima')?.value) || 0;
  const sisa     = diterima - total;
  const el       = document.getElementById('kembalianVal');
  if (!diterima) { el.textContent = '—'; el.className = 'kembalian-val'; return; }
  el.textContent = sisa >= 0 ? rp(sisa) : `Kurang ${rp(Math.abs(sisa))}`;
  el.className   = 'kembalian-val' + (sisa < 0 ? ' kurang' : '');
}

// (nomor faktur pratinjau dihapus — nomor asli baru muncul setelah disimpan)

// ══════════════════════════════════════════════
// SIMPAN TRANSAKSI
// ══════════════════════════════════════════════
async function simpanTransaksi() {
  const tgl   = document.getElementById('tglTrx').value;
  const kasir = document.getElementById('kasirTrx').value || 'admin';
  if (!tgl) { alert('Pilih tanggal'); return; }
  const items = Object.values(orderItems);
  if (!items.length) { alert('Belum ada menu dipilih'); return; }

  const btn = document.getElementById('btnSimpan');
  btn.disabled = true; btn.textContent = '⏳ Menyimpan...';

  try {
    const payload = items.map(it => ({
      nama_menu: it.nama_menu, qty: it.qty,
      harga: it.harga, subtotal: it.qty * it.harga
    }));
    const diskonTotal = getDiskonCustom();
    const data = await apiPost({
      action: 'simpanTransaksi',
      tanggal: fmtDate(tgl),
      metode_bayar: metodeBayar,
      kasir, items: payload, diskon_total: diskonTotal
    });

    if (data.status === 'ok') {
      const diskonInfo = data.diskon > 0 ? ` <span style="color:var(--merah);">(diskon ${rp(data.diskon)})</span>` : '';
      document.getElementById('simpanStatus').innerHTML =
        `<span style="color:var(--hijau);">✅ ${data.id_transaksi} — ${rp(data.total)}${diskonInfo}</span>
        <br><a href="invoice.html?id=${data.id_transaksi}&type=jual" target="_blank" style="color:var(--hijau);font-weight:600;">🔗 Lihat/Bagikan Invoice</a>`;

      // Cetak otomatis — struk & item masih ada di memori sebelum reset di bawah
      if (btCharacteristic) {
        btn.textContent = '🖨️ Mencetak...';
        try {
          await printStrukBluetooth(data.id_transaksi);
        } catch(e) {
          document.getElementById('simpanStatus').innerHTML +=
            `<br><span style="color:var(--merah);">⚠️ Gagal cetak: ${e.message}</span>`;
        }
      } else {
        document.getElementById('simpanStatus').innerHTML +=
          `<br><span style="color:var(--emas);">⚠️ Printer belum terhubung — struk tidak tercetak</span>`;
      }

      // Hapus dari draft (di server) kalau transaksi ini berasal dari draft
      if (currentDraftId !== null) { await hapusDraft(currentDraftId, false); }
      currentDraftId = null;

      setTimeout(resetStruk, 1800);
    } else {
      document.getElementById('simpanStatus').innerHTML =
        `<span style="color:var(--merah);">❌ ${data.message}</span>`;
    }
  } catch(e) {
    document.getElementById('simpanStatus').innerHTML =
      `<span style="color:var(--merah);">❌ Gagal konek ke server</span>`;
  } finally {
    btn.disabled = false; btn.textContent = '🖨️ Simpan & Cetak';
  }
}

// ══════════════════════════════════════════════
// DRAFT
// ══════════════════════════════════════════════
async function loadDraftListFromServer() {
  try {
    const res = await apiGet({ action: 'getDraftList' });
    if (res.status === 'ok') {
      draftList = res.data || [];
    }
  } catch(e) {
    console.error('Gagal memuat draft:', e);
  }
  renderDraftCount();
  renderDraftUI();
}

async function simpanDraft() {
  const items = Object.values(orderItems);
  if (!items.length) { alert('Belum ada menu dipilih'); return; }
  const tgl = document.getElementById('tglTrx').value;

  document.getElementById('simpanStatus').innerHTML =
    `<span style="color:var(--emas);">⏳ Menyimpan draft...</span>`;

  try {
    const res = await apiPost({
      action: 'simpanDraftServer',
      id_draft: currentDraftId, // null kalau draft baru
      tanggal: fmtDate(tgl),
      kasir: document.getElementById('kasirTrx').value || 'admin',
      metode_bayar: metodeBayar,
      items
    });
    if (res.status === 'ok') {
      currentDraftId = res.id_draft;
      await loadDraftListFromServer();
      document.getElementById('simpanStatus').innerHTML =
        `<span style="color:var(--emas);">📋 Draft tersimpan — bisa dilanjutkan dari device lain</span>`;
    } else {
      document.getElementById('simpanStatus').innerHTML =
        `<span style="color:var(--merah);">❌ Gagal simpan draft: ${res.message}</span>`;
    }
  } catch(e) {
    document.getElementById('simpanStatus').innerHTML =
      `<span style="color:var(--merah);">❌ Gagal konek ke server</span>`;
  }
  setTimeout(() => { document.getElementById('simpanStatus').innerHTML = ''; }, 2500);
}

function loadDraft(id) {
  const draft = draftList.find(d => String(d.id_draft) === String(id));
  if (!draft) return;
  currentDraftId = draft.id_draft;
  orderItems = {};
  (draft.items || []).forEach(it => {
    const key = it.tipe === 'paket' ? ('PAKET::' + it.nama_menu.replace(' 🎁','')) : (it.nama_menu.includes('(Tanpa Nasi)') ? it.nama_menu.replace(' (Tanpa Nasi)','') + '::tanpanasi' : it.nama_menu);
    orderItems[key] = { ...it };
  });
  document.getElementById('tglTrx').value = draft.tanggal ? isoFromDMY(draft.tanggal) : document.getElementById('tglTrx').value;
  // Set metode
  metodeBayar = draft.metode_bayar || 'Tunai';
  document.querySelectorAll('.metode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.val === metodeBayar);
  });
  document.getElementById('kembalianWrap').style.display = metodeBayar === 'Tunai' ? 'block' : 'none';
  renderStruk();
  renderMenuGrid();
  tutupModalDraft();
  if (window.innerWidth <= 860) switchTab('struk');
}

function isoFromDMY(dmy) {
  const [d, m, y] = (dmy || '').split('/');
  if (!d || !m || !y) return '';
  return `${y}-${m}-${d}`;
}

async function hapusDraft(id, confirm_ = true) {
  if (confirm_ && !confirm('Hapus draft ini? Draft akan hilang dari semua device.')) return;
  try {
    await apiPost({ action: 'hapusDraftServer', id_draft: id });
  } catch(e) {}
  if (String(currentDraftId) === String(id)) currentDraftId = null;
  await loadDraftListFromServer();
  renderModalDraftList();
}

function renderDraftCount() {
  const n = draftList.length;
  const span = document.getElementById('draftCount');
  span.style.display = n > 0 ? 'inline-block' : 'none';
  span.textContent   = n;
  const kartu = document.getElementById('draftBadgeKartu');
  if (kartu) kartu.textContent = `${n} draft`;
}

function renderDraftUI() {
  const card = document.getElementById('cardDraft');
  const list = document.getElementById('draftList');
  if (!draftList.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  list.innerHTML = draftList.map(d => {
    const total = (d.items||[]).reduce((s,it) => s + it.qty * it.harga, 0);
    return `
    <div class="draft-item" onclick="loadDraft('${d.id_draft}')">
      <div class="di-left">
        <div class="di-no">${d.id_draft} <span style="font-size:10px;color:var(--teks-abu);">${d.dibuat_pada||''} — ${d.kasir||''}</span></div>
        <div class="di-info">${(d.items||[]).length} menu · ${d.metode_bayar||'Tunai'}</div>
      </div>
      <div class="di-right">
        <span class="di-total">${rp(total)}</span>
        <button class="btn-del-draft" onclick="event.stopPropagation();hapusDraft('${d.id_draft}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

function bukaModalDraft() {
  document.getElementById('modalDraft').style.display = 'flex';
  document.getElementById('modalDraftList').innerHTML =
    '<div class="loading-state"><div class="loading-spinner"></div>Memuat draft terbaru...</div>';
  // Selalu refresh dari server saat modal dibuka — biar lihat draft terbaru dari device lain
  loadDraftListFromServer().then(renderModalDraftList);
}
function tutupModalDraft() { document.getElementById('modalDraft').style.display = 'none'; }
document.getElementById('modalDraft').addEventListener('click', function(e) {
  if (e.target === this) tutupModalDraft();
});

function renderModalDraftList() {
  const el = document.getElementById('modalDraftList');
  if (!draftList.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>Belum ada draft tersimpan</div>';
    return;
  }
  el.innerHTML = draftList.map(d => {
    const total = (d.items||[]).reduce((s,it) => s + it.qty * it.harga, 0);
    return `
    <div class="draft-item" style="margin-bottom:8px;" onclick="loadDraft('${d.id_draft}')">
      <div class="di-left">
        <div class="di-no">${d.id_draft} <span style="font-size:10px;color:var(--teks-abu);">${d.dibuat_pada||''} — ${d.kasir||''}</span></div>
        <div class="di-info">${(d.items||[]).length} menu — ${d.metode_bayar||'Tunai'}</div>
        <div class="di-info" style="margin-top:2px;font-size:11px;">
          ${(d.items||[]).slice(0,3).map(it=>`${it.nama_menu} ×${it.qty}`).join(', ')}${(d.items||[]).length>3?'...':''}
        </div>
      </div>
      <div class="di-right">
        <span class="di-total">${rp(total)}</span>
        <button class="btn-del-draft" onclick="event.stopPropagation();hapusDraft('${d.id_draft}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

// PRINTER — fungsi umum (connect, buildEscPosReceipt, dst) ada di printer.js
// ══════════════════════════════════════════════

async function printStrukBluetooth(idTrxOverride) {
  if (!btCharacteristic) { alert('Printer belum terhubung. Klik "Hubungkan" dulu.'); return; }
  const items = Object.values(orderItems);
  if (!items.length) { alert('Belum ada item'); return; }

  const paper = getPaperWidth();
  const cols  = paper === '80' ? 48 : 32;
  const dots  = paper === '80' ? 576 : 384;

  const tgl      = document.getElementById('tglTrx').value;
  const kasir    = document.getElementById('kasirTrx').value || 'admin';
  const subtotal = items.reduce((s, it) => s + it.qty * it.harga, 0);
  const diskonTotal = getDiskonCustom();
  const total    = Math.max(0, subtotal - diskonTotal);
  const idTrx    = idTrxOverride || '(belum tersimpan)';
  const now_     = new Date();
  const jam      = now_.toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });
  const tglFmt   = tgl ? fmtDate(tgl) : todayStrDisplay();
  const diterima  = parseFloat(document.getElementById('uangDiterima')?.value) || 0;
  const kembalian = diterima - total;

  const meta = {
    idTrx, tglFmt, jam, kasir, metodeBayar, subtotal, diskonTotal, total,
    diterima: metodeBayar==='Tunai'?diterima:0, kembalian
  };

  const bytesReceipt = await buildEscPosReceipt(items, meta, cols, dots);
  await sendToPrinterBLE(bytesReceipt);
}

// ══════════════════════════════════════════════
// CETAK REKAP HARIAN — bukti fisik kasir/shift
// ══════════════════════════════════════════════
async function cetakRekapHarian() {
  if (!btCharacteristic) { alert('Printer belum terhubung. Klik "Hubungkan" dulu.'); return; }

  const btn = document.getElementById('btnRekapHarian');
  const teksAsli = btn.textContent;
  btn.disabled = true; btn.textContent = '⏳ Memuat...';

  try {
    const tgl = document.getElementById('tglRekapHarian').value;
    const tglFmt = tgl ? fmtDate(tgl) : todayStrDisplay();

    const res = await apiGet({ action:'getRekapHarianStruk', tanggal: tglFmt });
    if (res.status !== 'ok') {
      alert('Gagal mengambil data rekap: ' + (res.message || 'error tidak diketahui') + '\n\n(Kalau pesannya "Action tidak dikenal", kemungkinan Code.gs belum di-deploy ulang dengan versi terbaru.)');
      return;
    }
    if (!res.data.length) {
      alert(`Belum ada transaksi tercatat pada tanggal ${tglFmt}.`);
      return;
    }

    const paper = getPaperWidth();
    const cols  = paper === '80' ? 48 : 32;
    const dots  = paper === '80' ? 576 : 384;

    btn.textContent = '🖨️ Mencetak...';
    const bytes = await buildRekapHarianEscPos(res.data, tglFmt, cols, dots);
    await sendToPrinterBLE(bytes);
  } catch(e) {
    alert('Gagal cetak rekap: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = teksAsli;
  }
}

async function buildRekapHarianEscPos(transaksiList, tglFmt, cols, dots) {
  const enc = new TextEncoder();
  const bytes = [];
  const push = (arr) => bytes.push(...arr);
  const text = (str) => push(Array.from(enc.encode(str)));

  push([0x1B, 0x40]);
  push([0x1B, 0x61, 0x01]); // center

  const logo = await getLogoBitmap(dots);
  if (logo) { push(Array.from(logo)); text('\n'); }

  push([0x1D, 0x21, 0x10]); // double-height
  push([0x1B, 0x45, 0x01]);
  text('REKAP PENJUALAN\n');
  text('ZAYTUN RIVERSIDE\n');
  push([0x1B, 0x45, 0x00]);
  push([0x1D, 0x21, 0x00]); // normal
  text('Alam Pauh Duo, Solok Selatan\n');
  text('0851-1144-7878\n');
  text(`Tanggal: ${tglFmt}\n`);
  text('='.repeat(cols) + '\n');
  push([0x1B, 0x61, 0x00]); // left

  transaksiList.forEach(trx => {
    text('='.repeat(cols) + '\n');
    push([0x1B, 0x61, 0x01]);
    text(`No: ${trx.id_transaksi}\n`);
    push([0x1B, 0x61, 0x00]);
    text(`Bayar: ${trx.metode_bayar}\n`);
    text('-'.repeat(cols) + '\n');
    trx.items.forEach(it => {
      text(padRight(it.nama_menu, cols) + '\n');
      text(padBetween(`${it.qty} x ${rpPlain(it.harga)}`, rpPlain(it.subtotal), cols) + '\n');
    });
    text('-'.repeat(cols) + '\n');
    push([0x1B, 0x45, 0x01]);
    text(padBetween('TOTAL', 'Rp ' + rpPlain(trx.total), cols) + '\n');
    push([0x1B, 0x45, 0x00]);
  });

  const grandTotal = transaksiList.reduce((s, t) => s + t.total, 0);
  text('='.repeat(cols) + '\n');
  push([0x1B, 0x61, 0x01]);
  push([0x1B, 0x45, 0x01]);
  text(`TOTAL ${transaksiList.length} STRUK\n`);
  text(`Rp ${rpPlain(grandTotal)}\n`);
  push([0x1B, 0x45, 0x00]);
  text('\n\n\n');
  push([0x1D, 0x56, 0x42, 0x00]);
  return new Uint8Array(bytes);
}

function switchTab(tab) {
  const panelMenu  = document.getElementById('panelMenu');
  const panelStruk = document.getElementById('panelStruk');
  const tabs       = document.querySelectorAll('.mobile-tab');

  if (tab === 'menu') {
    panelMenu.classList.remove('hidden-mobile');
    panelStruk.classList.add('hidden-mobile');
    tabs[0].classList.add('active'); tabs[1].classList.remove('active');
  } else {
    panelMenu.classList.add('hidden-mobile');
    panelStruk.classList.remove('hidden-mobile');
    tabs[0].classList.remove('active'); tabs[1].classList.add('active');
  }
}
